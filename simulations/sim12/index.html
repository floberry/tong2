<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전기장 시뮬레이션 · 고2 물리학</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg:           #f0f2f5;
  --surface:      #ffffff;
  --surface2:     #f7f8fa;
  --border:       #e2e5ea;
  --text:         #1a1d23;
  --text-sub:     #5a6072;
  --text-dim:     #9aa0ad;
  --red:          #c0392b;
  --red-bg:       #fdf0ef;
  --green:        #16a34a;
  --green-bg:     #f0fdf4;
  --accent:       #6d28d9;
  --accent-light: #ede9fe;
  --radius:       14px;
  --shadow:       0 2px 12px rgba(0,0,0,0.07);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding: 28px 16px 60px;
}

.top-bar {
  max-width: 680px;
  margin: 0 auto 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.tag {
  font-family: 'Space Mono', monospace;
  font-size: 10.5px;
  background: var(--accent);
  color: #fff;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.title-block h1 { font-size: 20px; font-weight: 900; color: var(--text); line-height: 1.3; }
.title-block h1 em { font-style: normal; color: var(--accent); }
.title-block p { font-size: 12px; color: var(--text-dim); margin-top: 3px; font-family: 'Space Mono', monospace; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 680px;
  margin: 0 auto 16px;
  overflow: hidden;
}
.card-head { display: flex; align-items: center; gap: 8px; padding: 14px 20px 0; }
.card-head .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.card-head span { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
.card-body { padding: 14px 20px 20px; }

.problem-text { font-size: 15px; line-height: 1.85; color: var(--text); }
.problem-text strong { color: var(--accent); font-weight: 700; }

.diagram-area {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 12px 16px;
  margin: 14px 0;
  display: flex;
  justify-content: center;
}
svg.scene { width: 100%; max-width: 500px; overflow: visible; }

.choices { display: flex; flex-direction: column; gap: 8px; }
.choice-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 11px 14px; cursor: pointer; text-align: left;
  transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; width: 100%;
}
.choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.choice-btn .num {
  width: 24px; height: 24px; border-radius: 50%; background: var(--border);
  color: var(--text-sub); font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-family: 'Space Mono', monospace; transition: all 0.15s;
}
.choice-btn .txt { font-size: 14px; color: var(--text); line-height: 1.5; padding-top: 2px; }
.choice-btn.selected { border-color: var(--accent); background: var(--accent-light); }
.choice-btn.selected .num { background: var(--accent); color: #fff; }
.choice-btn.correct { border-color: var(--green); background: var(--green-bg); }
.choice-btn.correct .num { background: var(--green); color: #fff; }
.choice-btn.wrong { border-color: var(--red); background: var(--red-bg); }
.choice-btn.wrong .num { background: var(--red); color: #fff; }

.btn-row { max-width: 680px; margin: 0 auto 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn { padding: 13px 20px; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--surface); border: 1.5px solid var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.feedback { max-width: 680px; margin: 0 auto; display: none; }
.feedback.show { display: block; }
.verdict-bar { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-radius: 10px; margin-bottom: 14px; font-size: 16px; font-weight: 700; }
.verdict-bar.ok { background: var(--green-bg); color: var(--green); border: 1.5px solid #bbf7d0; }
.verdict-bar.ng { background: var(--red-bg); color: var(--red); border: 1.5px solid #fecaca; }

.solution { font-size: 13.5px; line-height: 1.9; }
.solution p { margin-bottom: 6px; }
.solution .section-title { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--accent); letter-spacing: 0.05em; margin: 14px 0 6px; text-transform: uppercase; }
.step-box { background: #faf9ff; border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 14px; margin: 8px 0; font-family: 'Space Mono', monospace; font-size: 12.5px; color: #3b0764; line-height: 1.8; }
.ok-badge { display: inline-block; background: var(--green-bg); color: var(--green); font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 4px; font-family: 'Space Mono', monospace; }
.ng-badge { display: inline-block; background: var(--red-bg); color: var(--red); font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 4px; font-family: 'Space Mono', monospace; }
.hi { color: var(--green); font-weight: 700; }
.formula-img { background: #1e1b4b; color: #c4b5fd; font-family: 'Space Mono', monospace; font-size: 13px; padding: 12px 16px; border-radius: 8px; margin: 10px 0; line-height: 1.7; }
.boki-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
.boki-table th { background: var(--accent-light); color: var(--accent); font-family: 'Space Mono', monospace; font-size: 11px; padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.boki-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
.boki-table tr:last-child td { border-bottom: none; }
.boki-table tr.tr-ok td { background: var(--green-bg); }
.boki-table tr.tr-ng td { background: var(--red-bg); color: var(--red); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="title-block">
    <h1>전기력과 <em>전기장</em> 시뮬레이션</h1>
    <p>2022 개정 · 고2 물리학 · 쿨롱 법칙</p>
  </div>
  <span class="tag">Physics Lab</span>
</div>

<div class="card">
  <div class="card-head"><div class="dot"></div><span>문제</span></div>
  <div class="card-body">
    <p class="problem-text" id="problem-text"></p>
    <div class="diagram-area">
      <svg class="scene" id="main-svg" viewBox="0 0 500 170"></svg>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-head"><div class="dot"></div><span>보기에서 옳은 것만 고른 것은?</span></div>
  <div class="card-body">
    <div class="choices" id="choices"></div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-secondary" onclick="newProblem()">🎲 새 문제</button>
  <button class="btn btn-primary" onclick="checkAnswer()">✔ 확인</button>
</div>

<div class="feedback" id="feedback">
  <div class="verdict-bar" id="verdict-bar"></div>
  <div class="card">
    <div class="card-head"><div class="dot"></div><span>풀이 해설</span></div>
    <div class="card-body solution" id="solution-body"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   PROBLEM MODEL — expanded with randomized ㄱ and ㄷ

   Setup:
   • P has charge +Q (positive, fixed on the left)
   • A has charge of magnitude q, sign UNKNOWN → to determine
   • Force on A: magnitude F, direction either RIGHT or LEFT (randomized)

   Physics:
   • F direction RIGHT (+x): P(+) pushes A right → A must be POSITIVE (같은 부호 → 척력)
   • F direction LEFT  (-x): P(+) pulls A left  → A must be NEGATIVE (다른 부호 → 인력)

   Electric field at A's position (due to P only):
   • E = F / |q|  [N/C]
   • Direction: P(+) → field always points AWAY from P → always to the RIGHT

   Randomized booleans:
   • forceRight  : true = force is rightward, false = leftward
   • A_positive  : derived from forceRight (right→positive, left→negative)
   
   보기 ㄱ: "A는 양(+)전하를 띤다."  → TRUE if A_positive, else FALSE
   보기 ㄱ_alt: "A는 음(-)전하를 띤다." → TRUE if !A_positive, else FALSE
   We randomly pick which claim ㄱ makes (양 or 음).
   ㄱ_says_positive: boolean (random)
   ㄱ is TRUE iff (ㄱ_says_positive === A_positive)

   보기 ㄴ: E value stated = E_stated, true = E_true = F/q
   ㄴ TRUE iff E_stated === E_true (50/50)

   보기 ㄷ: "A가 놓인 곳에 형성된 전기장의 방향은 [왼쪽/오른쪽]이다."
   ㄷ_says_right: boolean (random)
   Field is always RIGHT (P is positive).
   ㄷ TRUE iff ㄷ_says_right === true

   Answer = the subset of {ㄱ,ㄴ,ㄷ} that are TRUE.
═══════════════════════════════════════════════════════ */

let state = {};
let selectedIdx = null;

// All 5 answer option combinations (order fixed as in original exam)
const CHOICE_SETS = [
  { label: 'ㄱ',          items: ['ㄱ'] },
  { label: 'ㄷ',          items: ['ㄷ'] },
  { label: 'ㄱ, ㄴ',     items: ['ㄱ','ㄴ'] },
  { label: 'ㄴ, ㄷ',     items: ['ㄴ','ㄷ'] },
  { label: 'ㄱ, ㄴ, ㄷ', items: ['ㄱ','ㄴ','ㄷ'] },
];

function findChoiceIdx(trueItems) {
  return CHOICE_SETS.findIndex(cs =>
    cs.items.length === trueItems.length &&
    cs.items.every(i => trueItems.includes(i))
  );
}

function generateProblem() {
  // P charge
  const Qopts = [5, 6, 8, 10, 12, 15, 20];
  const Q = Qopts[Math.floor(Math.random() * Qopts.length)];

  // A charge magnitude
  const q = Math.floor(Math.random() * 5) + 1;

  // True electric field (integer)
  const Eopts = [2, 3, 4, 5, 6, 7, 8, 10];
  const E_true = Eopts[Math.floor(Math.random() * Eopts.length)];
  const F = E_true * q;

  // Force direction (right = repulsion → A positive; left = attraction → A negative)
  const forceRight = Math.random() < 0.5;  // true = rightward
  const A_positive = forceRight;            // P is positive, so same sign → repel right

  // ㄱ: randomly claims A is positive OR negative
  const gak_says_positive = Math.random() < 0.5;
  const gak_true = (gak_says_positive === A_positive);

  // ㄴ: stated E value — 50/50 correct or wrong
  const nae_correct = Math.random() < 0.5;
  let E_stated;
  if (nae_correct) {
    E_stated = E_true;
  } else {
    const wrong = Eopts.filter(e => e !== E_true);
    E_stated = wrong[Math.floor(Math.random() * wrong.length)];
  }

  // ㄷ: randomly claims field is right OR left
  // Field is always RIGHT (P is positive)
  const deut_says_right = Math.random() < 0.5;
  const deut_true = deut_says_right; // true only when it says right

  // Collect true items
  const trueItems = [];
  if (gak_true)  trueItems.push('ㄱ');
  if (nae_correct) trueItems.push('ㄴ');
  if (deut_true) trueItems.push('ㄷ');

  // Edge case: if trueItems is empty or doesn't match any choice, regenerate
  // Possible true combos: {}, {ㄱ}, {ㄷ}, {ㄱ,ㄴ}, {ㄴ,ㄷ}, {ㄱ,ㄴ,ㄷ}, {ㄴ}, {ㄱ,ㄷ}
  // Our CHOICE_SETS covers: {ㄱ}, {ㄷ}, {ㄱ,ㄴ}, {ㄴ,ㄷ}, {ㄱ,ㄴ,ㄷ}
  // Missing: {}, {ㄴ}, {ㄱ,ㄷ} → need to reroll if these occur
  const correctIdx = findChoiceIdx(trueItems);
  if (correctIdx === -1) {
    // regenerate
    return generateProblem();
  }

  state = {
    Q, q, F, E_true, E_stated,
    forceRight, A_positive,
    gak_says_positive, gak_true,
    nae_correct,
    deut_says_right, deut_true,
    trueItems, correctIdx
  };
  selectedIdx = null;
}

/* ── SVG Rose helper ──
   Draws a detailed rose icon at (cx, cy).
   isColored: true = red rose, false = grayscale rose
   size: overall scale factor (default 1.0 = ~52px tall)
   chargeText: small label drawn below the rose
   label: 'P' or 'A' shown further below
*/
function drawRose(svg, ns, cx, cy, opts) {
  const mk = (tag, attrs) => {
    const el = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  };
  const mkT = (tag, attrs, text) => { const el = mk(tag, attrs); el.textContent = text; return el; };

  const s = opts.size || 1.0;   // scale
  const col = opts.isColored;

  // Color palette
  const petalMain  = col ? '#e53e3e' : '#9ca3af';
  const petalMid   = col ? '#c53030' : '#6b7280';
  const petalDark  = col ? '#9b2c2c' : '#4b5563';
  const petalLight = col ? '#fc8181' : '#d1d5db';
  const petalHi    = col ? '#fed7d7' : '#f3f4f6';
  const leafCol    = col ? '#276749' : '#6b7280';
  const leafDark   = col ? '#1c4532' : '#4b5563';
  const stemCol    = col ? '#2f855a' : '#6b7280';
  const sepCol     = col ? '#38a169' : '#9ca3af';

  // Group with transform: scale around (cx, cy)
  const g = mk('g', { transform: `translate(${cx}, ${cy}) scale(${s})` });

  // ── Stem ──
  g.appendChild(mk('line', { x1: 0, y1: 22, x2: 0, y2: 46, stroke: stemCol, 'stroke-width': '2.5', 'stroke-linecap': 'round' }));

  // ── Leaves ──
  // Left leaf
  g.appendChild(mk('path', {
    d: 'M0,34 Q-14,28 -16,20 Q-8,26 0,30 Z',
    fill: leafCol, stroke: leafDark, 'stroke-width': '0.5'
  }));
  // Right leaf
  g.appendChild(mk('path', {
    d: 'M0,34 Q14,28 16,20 Q8,26 0,30 Z',
    fill: leafCol, stroke: leafDark, 'stroke-width': '0.5'
  }));

  // ── Sepals (green pointy bits under petals) ──
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * 360 - 90;
    const r = a * Math.PI / 180;
    const sx = Math.cos(r) * 13;
    const sy = Math.sin(r) * 13;
    g.appendChild(mk('path', {
      d: `M0,0 Q${sx * 0.4},${sy * 0.4 - 2} ${sx},${sy} Q${sx * 0.6},${sy * 0.6} 0,4 Z`,
      fill: sepCol, stroke: leafDark, 'stroke-width': '0.3',
      transform: `translate(0, 14)`
    }));
  }

  // ── Outer petals (5, spread wide) ──
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * 360 - 90;
    const r = a * Math.PI / 180;
    // Each outer petal: a wide teardrop shape rotated outward
    g.appendChild(mk('ellipse', {
      cx: Math.cos(r) * 11,
      cy: Math.sin(r) * 11,
      rx: 8, ry: 12,
      fill: petalMid,
      stroke: petalDark, 'stroke-width': '0.5',
      transform: `rotate(${a + 90}, ${Math.cos(r) * 11}, ${Math.sin(r) * 11})`
    }));
  }

  // ── Mid petals (5, slightly inward and lighter) ──
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * 360 - 54;  // offset by half step
    const r = a * Math.PI / 180;
    g.appendChild(mk('ellipse', {
      cx: Math.cos(r) * 8,
      cy: Math.sin(r) * 8,
      rx: 7, ry: 10,
      fill: petalMain,
      stroke: petalMid, 'stroke-width': '0.4',
      transform: `rotate(${a + 90}, ${Math.cos(r) * 8}, ${Math.sin(r) * 8})`
    }));
  }

  // ── Inner petals (3-4, tightly curled at center) ──
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * 360 - 45;
    const r = a * Math.PI / 180;
    g.appendChild(mk('path', {
      d: `M0,0 Q${Math.cos(r)*10},${Math.sin(r)*10} ${Math.cos(r)*6},${Math.sin(r)*6} Q${Math.cos(r+0.5)*4},${Math.sin(r+0.5)*4} 0,0 Z`,
      fill: petalLight, stroke: petalMid, 'stroke-width': '0.35', opacity: '0.9'
    }));
  }

  // ── Center bud ──
  // Spiral-like center: layered small ellipses
  g.appendChild(mk('ellipse', { cx: 0, cy: 0, rx: 5.5, ry: 5, fill: petalMid, stroke: petalDark, 'stroke-width': '0.6' }));
  g.appendChild(mk('ellipse', { cx: -1, cy: -1, rx: 3.5, ry: 3, fill: petalLight, stroke: petalMid, 'stroke-width': '0.4' }));
  // Inner curl highlight
  g.appendChild(mk('path', {
    d: 'M-2,-2 Q0,-4 2,-1 Q1,1 -1,1 Q-3,0 -2,-2 Z',
    fill: petalHi, opacity: '0.7'
  }));

  svg.appendChild(g);

  // ── Charge text ── (above rose)
  if (opts.chargeText) {
    svg.appendChild(mkT('text', {
      x: cx, y: cy - s * 28,
      'text-anchor': 'middle',
      fill: col ? '#b91c1c' : '#374151',
      'font-size': '11.5', 'font-family': 'Space Mono', 'font-weight': '700'
    }, opts.chargeText));
  }

  // ── Label ── (below stem)
  if (opts.label) {
    svg.appendChild(mkT('text', {
      x: cx, y: cy + s * 52,
      'text-anchor': 'middle',
      fill: col ? '#b91c1c' : '#374151',
      'font-size': '13', 'font-family': 'Noto Sans KR', 'font-weight': '700'
    }, opts.label));
  }
}

function drawScene() {
  const { Q, q, F, forceRight } = state;
  const svg = document.getElementById('main-svg');
  svg.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  const mk = (tag, attrs) => {
    const el = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  };
  const mkT = (tag, attrs, text) => { const el = mk(tag, attrs); el.textContent = text; return el; };

  // Roses are ~90px tall (s=1: top at cy-28, stem bottom at cy+46)
  // Place them so axis line runs through the bud center area
  const W = 500, midY = 68;
  const Px = 120, Ax = 340;

  // Dashed axis (runs through midY)
  svg.appendChild(mk('line', { x1: 30, y1: midY, x2: W - 20, y2: midY, stroke: '#cbd5e1', 'stroke-width': 1.2, 'stroke-dasharray': '5,4' }));
  svg.appendChild(mk('polygon', { points: `${W-20},${midY} ${W-30},${midY-5} ${W-30},${midY+5}`, fill: '#94a3b8' }));

  // ── P: red rose ──
  drawRose(svg, ns, Px, midY, {
    size: 1.05,
    isColored: true,
    chargeText: `+${Q} C`,
    label: 'P'
  });

  // ── A: grayscale rose ──
  drawRose(svg, ns, Ax, midY, {
    size: 0.95,
    isColored: false,
    chargeText: `${q} C`,
    label: 'A'
  });

  // ── Force arrow on A ──
  // Arrow starts/ends beside the rose bloom (horizontally, at midY)
  const startX = forceRight ? Ax + 15 : Ax - 15;
  const endX   = forceRight ? Ax + 72 : Ax - 72;

  svg.appendChild(mk('line', { x1: startX, y1: midY, x2: endX, y2: midY, stroke: '#dc2626', 'stroke-width': 2.8, 'stroke-linecap': 'round' }));
  if (forceRight) {
    svg.appendChild(mk('polygon', { points: `${endX},${midY} ${endX-11},${midY-5} ${endX-11},${midY+5}`, fill: '#dc2626' }));
  } else {
    svg.appendChild(mk('polygon', { points: `${endX},${midY} ${endX+11},${midY-5} ${endX+11},${midY+5}`, fill: '#dc2626' }));
  }
  svg.appendChild(mkT('text', {
    x: (startX + endX) / 2, y: midY - 9,
    'text-anchor': 'middle', fill: '#dc2626',
    'font-size': '12', 'font-family': 'Space Mono', 'font-weight': '700'
  }, `${F} N`));
}

function renderProblemText() {
  const { Q, q, F, forceRight, E_stated, gak_says_positive, deut_says_right } = state;
  const forceDir = forceRight ? '오른쪽' : '왼쪽';
  const gakClaim = gak_says_positive ? 'A는 양(+)전하를 띤다.' : 'A는 음(−)전하를 띤다.';
  const deutClaim = deut_says_right
    ? 'A가 놓인 곳에 형성된 전기장의 방향은 오른쪽이다.'
    : 'A가 놓인 곳에 형성된 전기장의 방향은 왼쪽이다.';

  document.getElementById('problem-text').innerHTML = `
    전하량이 <strong>+${Q} C</strong>인 전하 P의 오른쪽에 전하량의 크기가 <strong>${q} C</strong>인 점전하 A를 두었더니
    <strong>${forceDir}으로 ${F} N</strong>의 전기력이 작용하였다.
    <br><br>
    <span style="font-size:13px;color:var(--text-sub)">다음 설명 중 옳은 것만 [보기]에서 있는 대로 고른 것은?</span>
    <br><br>
    <span style="display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 18px;font-size:13.5px;line-height:2.2;">
      <b style="font-size:13px;color:var(--text-sub);font-family:'Space Mono',monospace;">보기</b><br>
      ㄱ. ${gakClaim}<br>
      ㄴ. A가 놓인 곳에 형성된 전기장의 세기는 <strong>${E_stated} N/C</strong>이다.<br>
      ㄷ. ${deutClaim}
    </span>`;
}

function renderChoices() {
  const container = document.getElementById('choices');
  container.innerHTML = '';
  CHOICE_SETS.forEach((cs, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="num">${i+1}</span><span class="txt">${cs.label}</span>`;
    btn.onclick = () => selectChoice(i);
    container.appendChild(btn);
  });
  selectedIdx = null;
}

function selectChoice(idx) {
  selectedIdx = idx;
  document.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
    b.classList.remove('correct', 'wrong');
  });
  document.getElementById('feedback').classList.remove('show');
}

function checkAnswer() {
  if (selectedIdx === null) { alert('보기를 선택해 주세요.'); return; }

  const { Q, q, F, E_true, E_stated, forceRight, A_positive,
          gak_says_positive, gak_true, nae_correct,
          deut_says_right, deut_true, correctIdx } = state;
  const isCorrect = selectedIdx === correctIdx;

  document.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.classList.remove('selected');
    if (i === correctIdx) b.classList.add('correct');
    else if (i === selectedIdx && !isCorrect) b.classList.add('wrong');
  });

  const forceDir  = forceRight ? '오른쪽(+x)' : '왼쪽(−x)';
  const A_sign_kr = A_positive ? '양(+)' : '음(−)';
  const A_sign_sym = A_positive ? '+' : '−';

  // ㄱ explanation
  const gakClaim = gak_says_positive ? 'A는 양(+)전하를 띤다' : 'A는 음(−)전하를 띤다';
  const gakResult = gak_true
    ? `<span class="ok-badge">참</span> — A는 실제로 <b>${A_sign_kr}전하</b>`
    : `<span class="ng-badge">거짓</span> — A는 실제로 <b>${A_sign_kr}전하</b>`;

  // ㄴ explanation
  const naeStatus = nae_correct
    ? `<span class="ok-badge">참</span> — E = F/q = ${F}/${q} = <b>${E_true} N/C</b>으로 제시값과 일치`
    : `<span class="ng-badge">거짓</span> — 실제 E = F/q = ${F}/${q} = <b>${E_true} N/C</b>, 제시값 ${E_stated} N/C과 불일치`;

  // ㄷ explanation
  const deutClaim = deut_says_right ? '오른쪽' : '왼쪽';
  const deutResult = deut_true
    ? `<span class="ok-badge">참</span> — 전기장은 실제로 <b>오른쪽</b> (P가 양전하이므로)`
    : `<span class="ng-badge">거짓</span> — 전기장은 실제로 <b>오른쪽</b>이지만 '${deutClaim}'이라고 제시됨`;

  const correctLabel = CHOICE_SETS[correctIdx].label;

  const sol = `
    <p class="section-title">① 힘의 방향으로 A의 전하 부호 파악</p>
    <p>P(+${Q}C)가 A에 <b>${forceDir}</b> 방향으로 ${F}N을 작용합니다.</p>
    <div class="step-box">
P는 양(+)전하 → P의 오른쪽에 있는 A에 대해:
• A가 양(+)이면 → 같은 부호 → 척력 → 오른쪽(+x) ↗
• A가 음(−)이면 → 다른 부호 → 인력 → 왼쪽(−x) ↙

힘이 <b>${forceRight ? '오른쪽' : '왼쪽'}</b> → A는 <b>${A_sign_kr}전하</b></div>

    <p class="section-title">② 전기장 세기 계산</p>
    <p>A의 위치에서 전기장 E = A를 제거했을 때 P가 만드는 전기장 = 단위 전하당 받는 힘</p>
    <div class="formula-img">E = F / |q|
  = ${F} N ÷ ${q} C
  = ${E_true} N/C</div>
    <p>ㄴ 제시값 <b>${E_stated} N/C</b> → ${naeStatus}</p>

    <p class="section-title">③ 전기장 방향 파악</p>
    <p>전기장 방향 = 양(+) 시험 전하가 받는 힘의 방향 = P(+)로부터 멀어지는 방향</p>
    <div class="step-box">P(+)가 A의 왼쪽에 위치
→ P가 만드는 전기장은 P에서 멀어지는 방향
→ <b>오른쪽(+x 방향)</b> ✓</div>
    <p>ㄷ 제시 방향: '${deutClaim}' → ${deutResult}</p>

    <p class="section-title">④ 보기 종합</p>
    <table class="boki-table">
      <tr><th>보기</th><th>명제</th><th>판정</th></tr>
      <tr class="${gak_true ? 'tr-ok' : 'tr-ng'}">
        <td><b>ㄱ</b></td>
        <td>${gakClaim}</td>
        <td>${gakResult}</td>
      </tr>
      <tr class="${nae_correct ? 'tr-ok' : 'tr-ng'}">
        <td><b>ㄴ</b></td>
        <td>전기장 세기 = ${E_stated} N/C</td>
        <td>${naeStatus}</td>
      </tr>
      <tr class="${deut_true ? 'tr-ok' : 'tr-ng'}">
        <td><b>ㄷ</b></td>
        <td>전기장 방향 = ${deutClaim}</td>
        <td>${deutResult}</td>
      </tr>
    </table>
    <p style="margin-top:14px"><span class="hi">∴ 정답: <b>${correctIdx+1}번</b> (${correctLabel})</span></p>
  `;

  const vb = document.getElementById('verdict-bar');
  vb.textContent = isCorrect ? '✅ 정답입니다!' : `❌ 오답 — 정답은 ${correctIdx+1}번 (${correctLabel})`;
  vb.className = 'verdict-bar ' + (isCorrect ? 'ok' : 'ng');
  document.getElementById('solution-body').innerHTML = sol;
  document.getElementById('feedback').classList.add('show');
  document.getElementById('feedback').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function newProblem() {
  generateProblem();
  renderProblemText();
  drawScene();
  renderChoices();
  document.getElementById('feedback').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
generateProblem();
renderProblemText();
drawScene();
renderChoices();
</script>
</body>
</html>
