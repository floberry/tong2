<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>⚡ 멀티탭의 전류 세기 구하기 ⚡</title>
<style>
  :root{
    --pastel1:#FFE9A8;
    --pastel2:#FFD9D6;
    --pastel3:#C9F0E8;
    --pastel4:#E3D9F7;
    --accent:#FFB74D;
    --accent2:#4DB6AC;
    --dark:#5b4a2b;
    --spark:#FF6F61;
    --green:#4CAF50;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Malgun Gothic','Segoe UI',sans-serif;
    background:linear-gradient(135deg,#fffaf0 0%, var(--pastel1) 35%, var(--pastel2) 70%, var(--pastel1) 100%);
    min-height:100vh;
    padding:20px;
    color:var(--dark);
  }
  .wrap{
    max-width:920px;
    margin:0 auto;
    background:#fffefb;
    border-radius:20px;
    box-shadow:0 10px 28px rgba(180,150,100,0.22);
    overflow:hidden;
    border:4px solid var(--accent);
  }
  header{
    background:linear-gradient(120deg,#FFE9A8,#FFD9D6 60%,#C9F0E8);
    padding:22px 28px;
    text-align:center;
    position:relative;
    border-bottom:4px solid #f0c98a;
  }
  header h1{
    margin:0;
    font-size:1.55em;
    color:#6b5530;
    text-shadow:0 1px 0 #fffdf2;
  }
  header .bolt{
    position:absolute;
    font-size:1.8em;
    animation:flicker 1.8s infinite;
    opacity:0.85;
  }
  header .bolt.left{left:18px; top:20px;}
  header .bolt.right{right:18px; top:20px;}
  @keyframes flicker{
    0%,100%{opacity:0.9;}
    50%{opacity:0.45;}
  }
  .content{padding:26px 30px;}

  /* ===== Intro / Host screen ===== */
  #introScreen{padding:34px 28px; text-align:center; position:relative;}
  .curtain{
    position:absolute;
    top:0; bottom:0;
    width:52%;
    background:repeating-linear-gradient(90deg,#D32F2F 0px,#D32F2F 22px,#B71C1C 22px,#B71C1C 44px);
    box-shadow:inset -8px 0 18px rgba(0,0,0,0.35);
    z-index:10;
    animation-fill-mode:forwards;
  }
  .curtain.left{
    left:0;
    border-radius:0 30% 30% 0;
    animation:curtainOpenLeft 1.6s ease-in-out 0.3s forwards;
  }
  .curtain.right{
    right:0;
    border-radius:30% 0 0 30%;
    animation:curtainOpenRight 1.6s ease-in-out 0.3s forwards;
  }
  .curtain::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:26px;
    background:#7a1313;
  }
  @keyframes curtainOpenLeft{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
  }
  @keyframes curtainOpenRight{
    0%{transform:translateX(0);}
    100%{transform:translateX(100%);}
  }
  .intro-stage{
    background:linear-gradient(180deg,#fff7e6,#ffe9c2);
    border-radius:18px;
    padding:24px 20px 10px;
    margin-bottom:18px;
    position:relative;
    overflow:hidden;
    min-height:200px;
  }
  .intro-host-row{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    opacity:0;
    animation:hostAppear 0.8s ease-out 1.7s forwards;
  }
  @keyframes hostAppear{
    0%{opacity:0; transform:translateY(14px) scale(0.92);}
    100%{opacity:1; transform:translateY(0) scale(1);}
  }
  .host-avatar-lg{width:160px; flex:0 0 160px;}
  .host-avatar-sm{width:78px; flex:0 0 78px;}

  .talk-bubble{
    position:relative;
    background:#fff;
    border:3px solid var(--accent);
    border-radius:18px;
    padding:16px 20px;
    max-width:480px;
    text-align:left;
    font-size:1.05em;
    line-height:1.7;
    color:#5b4a2b;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
    animation:talkBounce 1.8s ease-in-out infinite;
  }
  @keyframes talkBounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-4px);}
  }
  .talk-bubble::after{
    content:"";
    position:absolute;
    bottom:18px; left:-13px;
    border-width:8px 14px 8px 0;
    border-style:solid;
    border-color:transparent var(--accent) transparent transparent;
  }
  .talk-bubble .dots{
    display:inline-block;
    margin-left:4px;
  }
  .talk-bubble .dots span{
    display:inline-block;
    width:5px;height:5px;
    margin:0 1px;
    background:var(--accent);
    border-radius:50%;
    animation:dotBlink 1.2s infinite;
  }
  .talk-bubble .dots span:nth-child(2){animation-delay:0.2s;}
  .talk-bubble .dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes dotBlink{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
  }
  .start-btn{
    font-size:1.15em;
    padding:14px 34px;
    border-radius:30px;
    background:linear-gradient(120deg,var(--accent),#FFCC80);
    color:#5b3d00;
    box-shadow:0 5px 0 #d99a3c;
    border:none;
    cursor:pointer;
    font-weight:bold;
    margin-top:18px;
    opacity:0;
    animation:hostAppear 0.8s ease-out 2s forwards;
  }
  .start-btn:active{transform:translateY(3px); box-shadow:0 2px 0 #d99a3c;}

  /* ===== Quiz screen ===== */
  #quizScreen{display:none;}
  .host-row{
    display:flex;
    align-items:flex-end;
    gap:14px;
    margin-bottom:16px;
  }
  .host-row .talk-bubble{margin:0; flex:1; max-width:none;}

  .problem-box{
    background:#fffaf0;
    border:2px dashed var(--accent);
    border-radius:14px;
    padding:18px 20px;
    margin-bottom:18px;
    line-height:1.7;
    font-size:1.03em;
  }
  .problem-box b{color:#b5792e;}
  .scene-area{
    display:flex;
    gap:22px;
    flex-wrap:wrap;
    align-items:flex-start;
    margin-bottom:18px;
  }
  .svg-card{
    flex:1 1 380px;
    background:linear-gradient(160deg,#fffefb,#fff3e2);
    border-radius:14px;
    border:2px solid #ffe0b0;
    padding:10px;
    text-align:center;
    box-shadow:inset 0 0 12px #fff0d6;
  }
  table.spec{
    flex:1 1 280px;
    border-collapse:collapse;
    width:100%;
    background:#fffefb;
    border-radius:10px;
    overflow:hidden;
    align-self:center;
  }
  table.spec th, table.spec td{
    border:1px solid #f5dba9;
    padding:10px 8px;
    text-align:center;
    font-size:1em;
  }
  table.spec th{
    background:linear-gradient(120deg,var(--accent),#FFCC80);
    color:#5b3d00;
  }
  table.spec td.device{font-weight:bold; color:#b5792e;}
  .question{
    font-size:1.08em;
    font-weight:bold;
    margin:14px 0 12px;
    color:#7a5a30;
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }
  .hint-btn{
    background:#fff3da;
    border:2px solid #ffcc80;
    border-radius:20px;
    cursor:pointer;
    font-size:0.85em;
    padding:6px 12px;
    font-weight:bold;
    color:#9a6a1e;
  }
  #hintBox{
    display:none;
    background:#fff7e6;
    border:2px solid #ffd699;
    border-radius:10px;
    padding:12px 16px;
    margin-bottom:14px;
    font-size:0.95em;
    line-height:1.6;
  }
  .choices{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
    margin-bottom:18px;
  }
  .choice{
    background:#fffefb;
    border:2px solid #ffe0b0;
    border-radius:12px;
    padding:12px 10px;
    cursor:pointer;
    text-align:center;
    font-weight:bold;
    transition:all .15s;
    user-select:none;
  }
  .choice:hover{background:#fff1d6; transform:translateY(-2px);}
  .choice.selected{
    background:linear-gradient(120deg,var(--accent),#FFCC80);
    color:#5b3d00;
    border-color:#d99a3c;
    box-shadow:0 0 0 3px #fff3da inset;
  }
  .btn-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  button{
    border:none;
    border-radius:10px;
    padding:12px 18px;
    font-size:1em;
    font-weight:bold;
    cursor:pointer;
    transition:transform .12s, box-shadow .12s;
  }
  button:active{transform:scale(0.96);}
  .btn-main{
    background:linear-gradient(120deg,#FFCC80,var(--accent));
    color:#5b3d00;
    box-shadow:0 4px 0 #d99a3c;
  }
  .btn-secondary{
    background:#fff;
    color:#b5792e;
    border:2px solid var(--accent);
  }
  .btn-secondary:hover{background:#fff3da;}
  .btn-teal{
    background:linear-gradient(120deg,var(--accent2),#80CBC4);
    color:#fff;
    box-shadow:0 4px 0 #2e8b81;
  }
  #result{
    margin-top:14px;
    border-radius:14px;
    padding:24px 20px;
    display:none;
    position:relative;
    overflow:hidden;
  }
  #result.correct{
    background:radial-gradient(circle at 50% 0%, #fffceb, #f3ffe9 60%, #e8f7e3);
    border:3px solid #9ccc65;
  }
  #result.wrong{
    background:radial-gradient(circle at 50% 0%, #f1f1f1, #fdeceb 60%);
    border:3px solid #ff8a80;
  }
  .result-title{
    font-size:1.5em;
    font-weight:bold;
    text-align:center;
    margin-bottom:6px;
    animation:popIn 0.4s ease;
  }
  @keyframes popIn{
    0%{transform:scale(0.3); opacity:0;}
    60%{transform:scale(1.1); opacity:1;}
    100%{transform:scale(1);}
  }
  .correct .result-title{color:var(--green);}
  .wrong .result-title{color:var(--spark);}
  .solution{
    background:#ffffffcc;
    border-radius:10px;
    padding:14px 16px;
    margin-top:10px;
    line-height:1.7;
    font-size:0.98em;
    position:relative;
    z-index:2;
  }

  .effect-stage{
    position:relative;
    height:190px;
    margin:6px 0 4px;
    overflow:hidden;
  }

  /* ---- WIN: trophy rising with sparkle + confetti ---- */
  .trophy-rise{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    font-size:110px;
    line-height:1;
    text-align:center;
    animation:trophyUp 1.4s ease-out forwards;
    z-index:2;
    filter:drop-shadow(0 6px 10px rgba(150,100,0,0.35));
  }
  @keyframes trophyUp{
    0%{transform:translate(-50%,-50%) translateY(40px) scale(0.5); opacity:0;}
    60%{transform:translate(-50%,-50%) translateY(-6px) scale(1.15); opacity:1;}
    100%{transform:translate(-50%,-50%) translateY(0) scale(1.05); opacity:1;}
  }
  .trophy-glow{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,224,130,0.65), rgba(255,224,130,0));
    animation:glowPulse 1.2s ease-in-out infinite alternate;
    z-index:1;
  }
  @keyframes glowPulse{
    from{opacity:0.5; transform:translateX(-50%) scale(0.9);}
    to{opacity:1; transform:translateX(-50%) scale(1.15);}
  }
  .sparkle{
    position:absolute; font-size:18px;
    animation:sparkleTwinkle 1.4s ease-in-out infinite;
    z-index:3;
  }
  @keyframes sparkleTwinkle{
    0%,100%{opacity:0.2; transform:scale(0.7) rotate(0deg);}
    50%{opacity:1; transform:scale(1.2) rotate(20deg);}
  }
  .confetti{
    position:absolute; top:-10px; border-radius:2px;
    animation:fall linear infinite;
    z-index:3;
  }
  @keyframes fall{
    0%{transform:translateY(0) rotate(0deg); opacity:1;}
    100%{transform:translateY(190px) rotate(360deg); opacity:0;}
  }

  /* ---- LOSE: trophy slipping away / fading + rain ---- */
  .trophy-fall{
    position:absolute; left:50%; top:6px; transform:translateX(-50%);
    width:80px;
    animation:trophyAway 1.6s ease-in forwards;
    z-index:2;
    opacity:0.9;
  }
  @keyframes trophyAway{
    0%{transform:translateX(-50%) translateY(0) rotate(0deg); opacity:0.95;}
    100%{transform:translateX(-65%) translateY(120px) rotate(-50deg); opacity:0.15;}
  }
  .sad-face{
    position:absolute; left:50%; top:14px; transform:translateX(-50%);
    font-size:54px;
    animation:sadShake 1.8s ease-in-out infinite;
    z-index:2;
  }
  @keyframes sadShake{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(4px);}
  }
  .raindrop{
    position:absolute; top:-10px;
    width:3px; height:14px;
    background:#b9c4cf;
    border-radius:2px;
    animation:rainFall linear infinite;
    z-index:1;
    opacity:0.6;
  }
  @keyframes rainFall{
    0%{transform:translateY(0); opacity:0.6;}
    100%{transform:translateY(190px); opacity:0;}
  }

  /* host final speech */
  .host-final{
    display:flex;
    align-items:flex-end;
    gap:14px;
    margin-top:16px;
  }
  .host-final .talk-bubble{flex:1; font-weight:bold; max-width:none;}

  .modal-bg{
    display:none;
    position:fixed; inset:0;
    background:rgba(80,60,30,0.45);
    align-items:center; justify-content:center;
    z-index:50;
  }
  .modal-box{
    background:#fffefb;
    border-radius:16px;
    border:4px solid var(--accent);
    padding:18px;
    max-width:600px;
    width:94%;
    text-align:center;
    box-shadow:0 10px 28px rgba(0,0,0,0.22);
  }
  .close-x{margin-top:10px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="bolt left">⚡</span>
    <h1>멀티탭의 전류 세기 구하기</h1>
    <span class="bolt right">⚡</span>
  </header>

  <!-- ===== INTRO HOST SCREEN ===== -->
  <div id="introScreen">
    <div class="curtain left"></div>
    <div class="curtain right"></div>
    <div class="intro-stage">
      <div class="intro-host-row">
        <div class="host-avatar-lg" id="hostAvatarLg"></div>
        <div class="talk-bubble" id="introSpeech">
          치열한 경쟁 끝에 결승에 오르셨습니다! 현재 공동 1위, 우승까지는 단 한 문제!<br>
          과연 마지막 문제를 맞히고 우승을 차지할 수 있을까요<span class="dots"><span></span><span></span><span></span></span>
        </div>
      </div>
    </div>
    <button class="start-btn" id="startBtn">🎤 시작하기</button>
  </div>

  <!-- ===== QUIZ SCREEN ===== -->
  <div id="quizScreen">
    <div class="content">
      <div class="host-row">
        <div class="host-avatar-sm" id="hostAvatarSm"></div>
        <div class="talk-bubble" id="hostQuestionSpeech">
          마지막 문제입니다! 잘 보고 신중하게 답해주세요.
        </div>
      </div>

      <div class="problem-box" id="problemText"></div>

      <div class="scene-area">
        <div class="svg-card">
          <div id="sceneSvgHolder"></div>
        </div>
        <table class="spec" id="specTable"></table>
      </div>

      <div class="question">
        <span id="qLabel"></span>
        <button class="hint-btn" id="hintBtn">💡 힌트</button>
        <button class="hint-btn" id="circuitBtn">🔌 회로도 확인</button>
      </div>
      <div id="hintBox"></div>

      <div class="choices" id="choicesArea"></div>

      <div class="btn-row">
        <button class="btn-main" id="checkBtn">✅ 확인</button>
        <button class="btn-secondary" id="newBtn">🔁 새문제</button>
      </div>

      <div id="result">
        <div class="result-title" id="resultTitle"></div>
        <div class="effect-stage" id="resultAnim"></div>
        <div class="host-final" id="hostFinal">
          <div class="host-avatar-sm" id="hostAvatarFinal"></div>
          <div class="talk-bubble" id="hostFinalSpeech"></div>
        </div>
        <div class="solution" id="solutionText"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <div id="circuitSvgHolder"></div>
    <button class="btn-main close-x" id="closeModal">닫기</button>
  </div>
</div>

<script>
const V = 220;
let state = {};

/* ===== host avatar svg: game-show host with suit, bowtie, mic, talking mouth ===== */
function hostSvg(){
  return `
  <svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;">
    <style>
      .mouthOpen{animation:mouthAnim 0.6s steps(1) infinite;}
      @keyframes mouthAnim{
        0%,100%{opacity:1;}
        50%{opacity:0;}
      }
      .mouthClosed{animation:mouthAnim2 0.6s steps(1) infinite;}
      @keyframes mouthAnim2{
        0%,100%{opacity:0;}
        50%{opacity:1;}
      }
      .handWave{animation:waveArm 1s ease-in-out infinite; transform-origin:150px 130px;}
      @keyframes waveArm{
        0%,100%{transform:rotate(0deg);}
        50%{transform:rotate(-12deg);}
      }
    </style>
    <ellipse cx="80" cy="193" rx="58" ry="7" fill="#e8d8b0" opacity="0.4"/>
    <!-- suit body -->
    <path d="M34,200 L34,158 C34,128 56,112 80,112 C104,112 126,128 126,158 L126,200 Z" fill="#5C6BC0"/>
    <path d="M58,158 L80,182 L102,158 L97,200 L63,200 Z" fill="#fff"/>
    <!-- bowtie -->
    <path d="M72,160 L80,168 L72,176 Z" fill="#E53935"/>
    <path d="M88,160 L80,168 L88,176 Z" fill="#E53935"/>
    <circle cx="80" cy="168" r="3.5" fill="#B71C1C"/>
    <!-- arm waving with mic -->
    <g class="handWave">
      <path d="M124,140 C140,135 150,128 152,118" stroke="#5C6BC0" stroke-width="14" fill="none" stroke-linecap="round"/>
      <circle cx="153" cy="113" r="9" fill="#444"/>
      <rect x="150" y="113" width="6" height="22" rx="3" fill="#888"/>
    </g>
    <!-- head -->
    <circle cx="80" cy="78" r="42" fill="#FFDDB0"/>
    <!-- hair -->
    <path d="M40,68 C40,32 120,32 120,68 C108,50 52,50 40,68 Z" fill="#3E2C18"/>
    <path d="M38,72 C30,80 30,95 38,100" stroke="#3E2C18" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M122,72 C130,80 130,95 122,100" stroke="#3E2C18" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- eyebrows -->
    <path d="M58,68 Q65,63 72,68" stroke="#3E2C18" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M88,68 Q95,63 102,68" stroke="#3E2C18" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- eyes -->
    <ellipse cx="66" cy="78" rx="4.5" ry="5.5" fill="#3E2C18"/>
    <ellipse cx="94" cy="78" rx="4.5" ry="5.5" fill="#3E2C18"/>
    <circle cx="67.5" cy="76" r="1.3" fill="#fff"/>
    <circle cx="95.5" cy="76" r="1.3" fill="#fff"/>
    <!-- cheeks -->
    <circle cx="54" cy="90" r="6" fill="#FFB7A1" opacity="0.55"/>
    <circle cx="106" cy="90" r="6" fill="#FFB7A1" opacity="0.55"/>
    <!-- talking mouth: open / closed alternate -->
    <ellipse class="mouthOpen" cx="80" cy="98" rx="11" ry="8" fill="#A8442A"/>
    <path class="mouthClosed" d="M66,96 Q80,108 94,96" stroke="#A8442A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </svg>`;
}

document.getElementById('hostAvatarLg').innerHTML = hostSvg();
document.getElementById('hostAvatarSm').innerHTML = hostSvg();
document.getElementById('hostAvatarFinal').innerHTML = hostSvg();

document.getElementById('startBtn').onclick = function(){
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  genProblem();
};

const powerOptions = [220,440,660,880,1100,1320];

function genProblem(){
  let chosen = [];
  let pool = powerOptions.slice();
  for(let i=0;i<3;i++){
    let idx = Math.floor(Math.random()*pool.length);
    chosen.push(pool[idx]);
    pool.splice(idx,1);
    if(pool.length===0) pool = powerOptions.slice();
  }
  const [pa,pb,pc] = chosen;
  const ia = pa/V, ib = pb/V, ic = pc/V;
  const totalI = ia+ib+ic;

  let correct = totalI;
  let distractors = new Set();
  distractors.add(Math.max(ia,ib,ic));
  distractors.add(ia+ib);
  distractors.add(correct+1);
  distractors.add(Math.max(1,correct-1));
  distractors.add(correct*2);
  distractors.delete(correct);

  let opts = Array.from(distractors).filter(v=>v>0);
  opts = Array.from(new Set(opts));
  opts.sort(()=>Math.random()-0.5);
  opts = opts.slice(0,4);
  while(opts.length<4){
    let v = correct + (Math.floor(Math.random()*6)+1)*(Math.random()<0.5?-1:1);
    if(v>0 && v!==correct && !opts.includes(v)) opts.push(v);
  }
  let all = opts.concat([correct]);
  all = Array.from(new Set(all));
  all.sort((a,b)=>a-b);

  state = {pa,pb,pc,ia,ib,ic,totalI:correct,choices:all};
  render();
}

function render(){
  document.getElementById('problemText').innerHTML =
    `<b>문제.</b> 그림은 각 전압이 220&nbsp;V인 전기 기구 A, B, C와 220&nbsp;V 전원에 연결된 멀티탭을, 표는 각 전기 기구의 소비 전력을 나타낸 것이다.`;

  document.getElementById('specTable').innerHTML = `
    <tr><th>전기 기구</th><th>소비 전력</th></tr>
    <tr><td class="device">A</td><td>${state.pa} W</td></tr>
    <tr><td class="device">B</td><td>${state.pb} W</td></tr>
    <tr><td class="device">C</td><td>${state.pc} W</td></tr>
  `;

  document.getElementById('qLabel').textContent =
    `A, B, C를 멀티탭에 동시에 연결할 때, 멀티탭에 흐르는 전류의 세기는?`;

  document.getElementById('hintBox').style.display = 'none';
  document.getElementById('hintBox').innerHTML =
    `<b>💡 힌트</b><br>① A, B, C는 모두 220V 전원에 <b>병렬</b>로 연결되어 있습니다. 병렬 연결에서는 각 기구에 걸리는 전압이 모두 같습니다.<br>② 전력 공식 <b>I = P / V</b> 를 이용해 각 기구에 흐르는 전류를 먼저 구해보세요.`;

  const choicesArea = document.getElementById('choicesArea');
  choicesArea.innerHTML = '';
  state.selected = null;
  const circled = ['①','②','③','④','⑤'];
  state.choices.forEach((c,i)=>{
    const div = document.createElement('div');
    div.className = 'choice';
    div.textContent = `${circled[i]} ${c} A`;
    div.onclick = ()=>{
      document.querySelectorAll('.choice').forEach(e=>e.classList.remove('selected'));
      div.classList.add('selected');
      state.selected = c;
    };
    choicesArea.appendChild(div);
  });

  document.getElementById('result').style.display = 'none';
  document.getElementById('result').className = '';
  document.getElementById('hostQuestionSpeech').textContent = '마지막 문제입니다! 잘 보고 신중하게 답해주세요.';
  drawScene();
  drawCircuit();
}

document.getElementById('hintBtn').onclick = function(){
  const box = document.getElementById('hintBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
};

document.getElementById('checkBtn').onclick = function(){
  if(state.selected === null || state.selected === undefined){
    alert('정답을 선택해주세요!');
    return;
  }
  const result = document.getElementById('result');
  const title = document.getElementById('resultTitle');
  const anim = document.getElementById('resultAnim');
  const sol = document.getElementById('solutionText');
  const finalSpeech = document.getElementById('hostFinalSpeech');

  const isCorrect = Math.abs(state.selected - state.totalI) < 0.001;

  result.style.display = 'block';
  result.className = isCorrect ? 'correct' : 'wrong';
  title.textContent = isCorrect ? '🏆 정답! 우승 확정! 🏆' : '💔 오답! 우승 실패... 💔';

  if(isCorrect){
    let sparkles = '';
    const sparklePos = [[15,20],[80,15],[8,70],[88,68],[25,90],[70,88]];
    sparklePos.forEach((p,i)=>{
      sparkles += `<div class="sparkle" style="left:${p[0]}%; top:${p[1]}px; animation-delay:${(i*0.18).toFixed(2)}s;">✨</div>`;
    });
    let confetti = '';
    const colors = ['#FFB74D','#4DB6AC','#BA68C8','#FF8A80','#9CCC65','#FFD54F'];
    for(let i=0;i<18;i++){
      const left = Math.random()*100;
      const dur = (1.6+Math.random()*1.2).toFixed(2);
      const delay = (Math.random()*1.4).toFixed(2);
      const size = 6+Math.random()*5;
      const color = colors[i%colors.length];
      confetti += `<div class="confetti" style="left:${left}%; width:${size}px; height:${size*0.5}px; background:${color}; animation-duration:${dur}s; animation-delay:${delay}s;"></div>`;
    }
    anim.innerHTML = `<div class="trophy-glow"></div>${confetti}${sparkles}<div class="trophy-rise">🏆</div>`;
    finalSpeech.textContent = '정답입니다! 축하합니다! 마지막 문제를 맞히며 최종 우승을 차지하셨습니다!';
  } else {
    let rain = '';
    for(let i=0;i<14;i++){
      const left = Math.random()*100;
      const dur = (1+Math.random()*0.8).toFixed(2);
      const delay = (Math.random()*1.2).toFixed(2);
      rain += `<div class="raindrop" style="left:${left}%; animation-duration:${dur}s; animation-delay:${delay}s;"></div>`;
    }
    anim.innerHTML = `${rain}<div class="sad-face">😢</div><div class="trophy-fall">🏆</div>`;
    finalSpeech.textContent = '아쉽습니다! 정답이 아닙니다. 우승은 다른 참가자에게 돌아갔습니다!';
  }

  sol.innerHTML = `
    <b>[풀이]</b><br>
    각 전기 기구는 220V 전원에 모두 <b>병렬로 연결</b>되어 있으므로, 각 기구에 걸리는 전압은 모두 220V로 같습니다.<br><br>
    소비 전력 P = VI 이므로, 각 기구에 흐르는 전류는 I = P / V 입니다.<br>
    I<sub>A</sub> = ${state.pa} W ÷ 220 V = <b>${state.ia} A</b><br>
    I<sub>B</sub> = ${state.pb} W ÷ 220 V = <b>${state.ib} A</b><br>
    I<sub>C</sub> = ${state.pc} W ÷ 220 V = <b>${state.ic} A</b><br><br>
    병렬 회로에서 전체 전류는 병렬로 연결된 각 전기기구에 흐르는 전류의 합과 같으므로,<br>
    I<sub>전체</sub> = I<sub>A</sub> + I<sub>B</sub> + I<sub>C</sub> = ${state.ia} + ${state.ib} + ${state.ic} = <b>${state.totalI} A</b>
  `;
  result.scrollIntoView({behavior:'smooth', block:'center'});
};
