<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>물리학 시뮬레이션 문항 연습</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background-color: #fff;
            border: 2px solid #333;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            border-bottom: 2px dashed #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            margin: 0;
            font-weight: bold;
        }
        .header .subject {
            font-size: 14px;
            color: #666;
        }
        .problem-box {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .problem-text {
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .option-btn {
            background-color: #fff;
            border: 1px solid #777;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover {
            background-color: #eee;
        }
        /* 정답 피드백 스타일에 동그라미 반영 */
        .option-btn.correct {
            background-color: #e0e0e0;
            border-color: #000;
            font-weight: bold;
        }
        .option-btn.correct::after {
            content: " ◯";
            font-size: 16px;
            font-weight: bold;
        }
        /* 사용자가 고른 오답 피드백 스타일에 X 표시 반영 */
        .option-btn.wrong-selected {
            background-color: #f5f5f5;
            border-color: #333;
            color: #666;
            text-decoration: line-through;
        }
        .option-btn.wrong-selected::after {
            content: " ❌ (내가 고른 답)";
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        /* 선택하지 않은 나머지 오답 처리 */
        .option-btn.wrong-unselected {
            background-color: #fafafa;
            border-color: #ccc;
            color: #aaa;
        }
        .btn-ctrl {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
        .btn-ctrl:hover {
            background-color: #555;
        }
        .feedback-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #333;
            background-color: #fafafa;
            display: none;
        }
        .feedback-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .feedback-text {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .sim-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        canvas {
            border: 1px solid #333;
            background-color: #fff;
        }
        .footer-buttons {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>[2022 개정 교육과정] 물리학 Ⅰ</h1>
        <span class="subject">단원: II-1. 전기장과 전기에너지</span>
    </div>

    <div class="problem-box">
        <div class="problem-text" id="problemText">문제를 생성 중입니다...</div>
    </div>

    <div class="options" id="optionsContainer">
        </div>

    <div class="footer-buttons">
        <button class="btn-ctrl" onclick="generateProblem()">새문제 생성</button>
    </div>

    <div class="feedback-box" id="feedbackBox">
        <div class="feedback-title" id="feedbackResult"></div>
        <div class="feedback-text" id="feedbackExplanation"></div>
        
        <div class="sim-container">
            <button class="btn-ctrl" id="simToggleBtn" onclick="toggleSimulation()">움직임 확인</button>
            <canvas id="simCanvas" width="550" height="150"></canvas>
        </div>
    </div>
</div>

<script>
    let currentData = {};
    let selected = false;
    let canvas, ctx;
    let animationId = null;
    let chargeX = 450;
    let chargeV = 0;
    let chargeA = -0.2; // 오른쪽에서 왼쪽으로 가속
    let isAnimating = false;

    function generateProblem() {
        selected = false;
        isAnimating = false;
        if(animationId) cancelAnimationFrame(animationId);
        document.getElementById('feedbackBox').style.display = 'none';
        
        const p1 = Math.floor(Math.random() * 8 + 3) * 100; // 300W ~ 1000W
        const p2 = Math.floor(Math.random() * 8 + 11) * 100; // 1100W ~ 1800W
        
        currentData = {
            p1: p1,
            p2: p2,
            correctAnswer: 2, 
            explanation: `소비전력은 단위 시간 동안 소비하는 전기 에너지를 의미합니다. 열선의 최대 온도가 동일하므로, 소비전력이 더 큰 <b>${p2}W 기기</b>가 더 많은 전기 에너지를 동력(모터의 바람 세기 등 역학적 운동에너지)으로 변환할 수 있어 바람이 가장 강합니다.<br><br><b>[전하 가속 원리]</b> 아래 시뮬레이션에서 전위는 오른쪽이 높고 왼쪽이 낮으므로 전기장 방향은 <b>오른쪽에서 왼쪽</b>입니다. 양전하(+)는 전기장과 같은 방향으로 힘을 받아 왼쪽으로 갈수록 속도가 가속되며, 이는 전기 퍼텐셜 에너지가 운동 에너지로 보존·전환되는 과정을 보여줍니다.`
        };

        document.getElementById('problemText').innerHTML = `Q. 소비전력이 각각 ${p1}W와 ${p2}W인 두 헤어드라이어가 있다. 두 드라이어의 최대 온도가 서로 같을 때, 전기 에너지를 역학적 에너지로 전환하는 능력이 더 우수하여 최대 바람 세기가 더 강한 기기는 무엇인가?`;

        const htmlOptions = `
            <button class="option-btn" onclick="checkAnswer(1, this)">① ${p1}W 드라이어</button>
            <button class="option-btn" onclick="checkAnswer(2, this)">② ${p2}W 드라이어</button>
            <button class="option-btn" onclick="checkAnswer(3, this)">③ 두 드라이어의 최대 바람 세기는 같다</button>
        `;
        document.getElementById('optionsContainer').innerHTML = htmlOptions;
        
        initCanvas();
    }

    function checkAnswer(ans, element) {
        if (selected) return;
        selected = true;

        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach((btn, index) => {
            const currentOptionNum = index + 1;
            
            if (currentOptionNum === currentData.correctAnswer) {
                // 정답 선지 처리 -> 동그라미(◯) 스타일 부여
                btn.classList.add('correct');
            } else if (currentOptionNum === ans) {
                // 사용자가 클릭한 틀린 선지 처리 -> ❌ 표시 스타일 부여
                btn.classList.add('wrong-selected');
            } else {
                // 선택되지 않은 나머지 오답 선지 처리
                btn.classList.add('wrong-unselected');
            }
        });

        const resultBox = document.getElementById('feedbackResult');
        const expBox = document.getElementById('feedbackExplanation');
        
        if (ans === currentData.correctAnswer) {
            resultBox.innerHTML = "정답입니다! ✔";
            resultBox.style.color = "#000";
        } else {
            resultBox.innerHTML = "오답입니다. 다시 한번 개념을 확인해 보세요.";
            resultBox.style.color = "#666";
        }

        expBox.innerHTML = currentData.explanation;
        document.getElementById('feedbackBox').style.display = 'block';
        initCanvas();
    }

    function initCanvas() {
        canvas = document.getElementById('simCanvas');
        ctx = canvas.getContext('2d');
        chargeX = 450;
        chargeV = 0;
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 전기장선 (오른쪽 -> 왼쪽 수평)
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1;
        for (let y = 30; y <= 120; y += 30) {
            ctx.beginPath();
            ctx.moveTo(500, y);
            ctx.lineTo(50, y);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(50, y);
            ctx.lineTo(60, y - 4);
            ctx.lineTo(60, y + 4);
            ctx.fillStyle = '#999';
            ctx.fill();
        }

        ctx.fillStyle = '#333';
        ctx.font = '12px sans-serif';
        ctx.fillText('고전위 (+)', 470, 20);
        ctx.fillText('저전위 (-)', 20, 20);
        
        ctx.textAlign = 'center';
        ctx.fillText('전기장(E) 방향 ◀ 수평 형성', canvas.width / 2, 20);

        // 양전하 (+)
        ctx.beginPath();
        ctx.arc(chargeX, 75, 13, 0, Math.PI * 2);
        ctx.fillStyle = '#333';
        ctx.fill();
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 15px sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillText('+', chargeX, 75);
        ctx.textAlign = 'left'; 
    }

    function updateSim() {
        if (!isAnimating) return;
        
        chargeV += chargeA;
        chargeX += chargeV;

        if (chargeX <= 60) {
            chargeX = 60;
            isAnimating = false;
            document.getElementById('simToggleBtn').innerText = "움직임 확인 (재생)";
        }

        draw();
        if (isAnimating) {
            animationId = requestAnimationFrame(updateSim);
        }
    }

    function toggleSimulation() {
        if (isAnimating) {
            isAnimating = false;
            document.getElementById('simToggleBtn').innerText = "움직임 확인";
            if(animationId) cancelAnimationFrame(animationId);
        } else {
            if (chargeX <= 60) {
                chargeX = 450;
                chargeV = 0;
            }
            isAnimating = true;
            document.getElementById('simToggleBtn').innerText = "정지";
            updateSim();
        }
    }

    window.onload = generateProblem;
</script>

</body>
</html>
