<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장난감 상자 물리실험실 - 자성 편</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&family=Noto+Sans+KR:wght@700;800;900&display=swap" rel="stylesheet">
<style>

  :root{
    --yellow-bg: #FFD93D;
    --yellow-bg-2: #FFC93C;
    --sky: #7EC8E3;
    --wood: #C97B3D;
    --wood-dark: #A85A2A;
    --red: #E8462A;
    --red-dark: #C5371E;
    --green: #4CAF7D;
    --cream: #FFF8E7;
    --ink: #3A2A1A;
    --purple: #8B6FB5;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 10% 15%, rgba(255,255,255,0.35) 0, transparent 35%),
      radial-gradient(circle at 90% 80%, rgba(255,255,255,0.25) 0, transparent 40%),
      repeating-linear-gradient(135deg, var(--yellow-bg) 0px, var(--yellow-bg) 40px, var(--yellow-bg-2) 40px, var(--yellow-bg-2) 80px);
    font-family:'Noto Sans KR', sans-serif; font-weight:800;
    color:var(--ink);
    padding:24px 14px 60px;
    overflow-x:hidden;
  }

  /* floating clouds/stars deco */
  .deco-star{
    position:fixed;
    font-size:28px;
    opacity:0.5;
    animation: floatY 6s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
  }
  @keyframes floatY{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-18px) rotate(10deg);}
  }

  .wrap{
    max-width:760px;
    margin:0 auto;
    position:relative;
    z-index:1;
  }

  /* ---------- HEADER ---------- */
  header{
    text-align:center;
    margin-bottom:18px;
  }
  .title-wrap{
    display:inline-flex;
    align-items:center;
    gap:8px;
    animation: titleBob 3s ease-in-out infinite;
  }
  @keyframes titleBob{
    0%,100%{transform:translateY(0) rotate(-2deg);}
    50%{transform:translateY(-6px) rotate(2deg);}
  }
  .title-mascot{
    font-size:2.1rem;
    display:inline-block;
    animation: mascotWiggle 1.8s ease-in-out infinite;
  }
  .title-mascot.right{animation-delay:0.3s;}
  @keyframes mascotWiggle{
    0%,100%{transform:rotate(-8deg) scale(1);}
    50%{transform:rotate(8deg) scale(1.08);}
  }
  .title-badge{
    display:inline-block;
    background:linear-gradient(160deg, #FF7A5C, var(--red));
    color:#fff;
    font-family:'Black Han Sans', sans-serif;
    font-size:1.85rem;
    padding:12px 30px;
    border-radius:50px;
    border:5px dashed var(--cream);
    box-shadow: 0 6px 0 var(--red-dark), 0 10px 16px rgba(0,0,0,0.22);
    letter-spacing:1px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    position:relative;
  }
  .title-badge::before, .title-badge::after{
    content:'🎀';
    position:absolute;
    font-size:1.3rem;
    top:50%;
    transform:translateY(-50%);
  }
  .title-badge::before{ left:-6px; }
  .title-badge::after{ right:-6px; }
  .subtitle{
    margin-top:16px;
    font-size:1.08rem;
    font-weight:800;
    color:var(--ink);
    background:#fff;
    display:inline-block;
    padding:6px 20px;
    border-radius:50px;
    border:3px solid var(--wood);
    box-shadow:0 3px 0 var(--wood);
  }

  /* ---------- PROGRESS STARS ---------- */
  .progress-row{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:18px 0 22px;
  }
  .progress-slot{
    width:46px;
    height:46px;
    border-radius:50%;
    background:var(--cream);
    border:4px dashed var(--wood);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    transition: transform 0.4s, background 0.4s, border 0.4s;
  }
  .progress-slot.filled{
    background:linear-gradient(160deg, #FFE17D, #FFB23D);
    border:4px solid var(--red);
    transform:scale(1.15) rotate(-6deg);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    animation: pop 0.5s ease;
  }
  @keyframes pop{
    0%{transform:scale(0.4) rotate(0deg);}
    60%{transform:scale(1.3) rotate(-10deg);}
    100%{transform:scale(1.15) rotate(-6deg);}
  }

  /* ---------- CARD ---------- */
  .card{
    background:var(--cream);
    border-radius:28px;
    border:5px solid var(--wood);
    padding:22px 22px 26px;
    box-shadow:0 10px 0 var(--wood-dark), 0 14px 24px rgba(0,0,0,0.25);
    position:relative;
    margin-bottom:22px;
  }
  .card::before{
    content:'';
    position:absolute;
    top:-18px; left:30px;
    font-size:0;
  }
  .stitch{
    position:absolute;
    inset:10px;
    border:3px dashed rgba(166,108,50,0.35);
    border-radius:20px;
    pointer-events:none;
  }

  .q-number{
    display:inline-block;
    background:var(--sky);
    font-family:'Jua', sans-serif;
    color:#fff;
    padding:4px 14px;
    border-radius:14px;
    font-size:1rem;
    margin-bottom:10px;
    box-shadow:0 3px 0 #5BA8C9;
  }

  .q-text{
    font-size:1.18rem;
    line-height:1.65;
    margin-bottom:16px;
  }

  .scene{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    margin:14px 0 18px;
  }

  /* ---------- OPTIONS ---------- */
  .options-label{
    font-family:'Jua', sans-serif;
    font-size:1.05rem;
    color:var(--red-dark);
    margin:14px 0 8px;
    text-align:center;
  }
  .bogi-box{
    background:#fff;
    border:3px solid var(--ink);
    border-radius:14px;
    padding:12px 16px;
    margin-bottom:16px;
  }
  .bogi-box div{
    font-size:1.05rem;
    margin:5px 0;
    line-height:1.5;
  }

  .choices{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
    gap:10px;
    margin-top:6px;
  }
  .choice-btn{
    font-family:'Noto Sans KR', sans-serif; font-weight:800;
    font-size:1.05rem;
    background:#fff;
    border:3px solid var(--wood);
    border-radius:16px;
    padding:10px 8px;
    cursor:pointer;
    transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
    box-shadow:0 4px 0 var(--wood);
  }
  .choice-btn:hover{
    background:#FFF3D6;
    transform:translateY(-2px);
  }
  .choice-btn.selected{
    background:var(--sky);
    color:#fff;
    border-color:#4F9DC4;
    box-shadow:0 4px 0 #4F9DC4;
  }
  .choice-btn:active{
    transform:translateY(2px);
    box-shadow:0 1px 0 var(--wood);
  }
  .choice-btn:disabled{
    cursor:default;
    opacity:0.9;
  }
  .choice-btn.correct-answer{
    background:var(--green) !important;
    color:#fff;
    border-color:#357A57 !important;
    box-shadow:0 4px 0 #357A57 !important;
  }
  .choice-btn.wrong-answer{
    background:var(--red) !important;
    color:#fff;
    border-color:var(--red-dark) !important;
    box-shadow:0 4px 0 var(--red-dark) !important;
  }

  /* ---------- BUTTON ROW ---------- */
  .btn-row{
    display:flex;
    gap:14px;
    justify-content:center;
    margin-top:20px;
    flex-wrap:wrap;
  }
  .toy-btn{
    font-family:'Jua', sans-serif;
    font-size:1.15rem;
    color:#fff;
    border:none;
    border-radius:50px;
    padding:13px 30px;
    cursor:pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing:1px;
  }
  .btn-check{
    background:var(--red);
    box-shadow:0 6px 0 var(--red-dark);
  }
  .btn-check:hover{transform:translateY(-2px);}
  .btn-check:active{transform:translateY(4px); box-shadow:0 2px 0 var(--red-dark);}
  .btn-check:disabled{
    background:#cfa68f; box-shadow:0 6px 0 #a98568; cursor:not-allowed;
  }

  .btn-new{
    background:var(--purple);
    box-shadow:0 6px 0 #6A5293;
  }
  .btn-new:hover{transform:translateY(-2px);}
  .btn-new:active{transform:translateY(4px); box-shadow:0 2px 0 #6A5293;}

  /* ---------- FEEDBACK ---------- */
  .feedback{
    margin-top:18px;
    border-radius:20px;
    padding:18px 20px;
    display:none;
    border:4px solid;
    animation: feedIn 0.4s ease;
  }
  @keyframes feedIn{
    0%{opacity:0; transform:translateY(10px);}
    100%{opacity:1; transform:translateY(0);}
  }
  .feedback.show{display:block;}
  .feedback.correct{
    background:#E9FAF0;
    border-color:var(--green);
  }
  .feedback.wrong{
    background:#FFEDE8;
    border-color:var(--red);
  }
  .feedback-title{
    font-family:'Jua', sans-serif;
    font-size:1.3rem;
    margin-bottom:8px;
  }
  .feedback.correct .feedback-title{color:#2E7D52;}
  .feedback.wrong .feedback-title{color:var(--red-dark);}
  .feedback-body{
    font-size:1.08rem;
    line-height:1.6;
    white-space:pre-line;
  }

  /* ---------- TOY CHARACTER STAGE ---------- */
  .toy-stage{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:18px;
    height:170px;
    margin:30px 0 10px;
    position:relative;
  }
  .toy{
    width:90px;
    transition: transform 0.3s;
    transform-origin:bottom center;
    position:relative;
  }

  /* idle bobbing */
  .toy.idle{ animation: bob 2.6s ease-in-out infinite; }
  @keyframes bob{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
  }

  /* happy: grow big + bounce */
  .toy.happy{ animation: growHappy 0.9s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes growHappy{
    0%{transform:scale(1) rotate(0deg);}
    45%{transform:scale(1.55) rotate(-6deg) translateY(-14px);}
    70%{transform:scale(1.35) rotate(5deg) translateY(-4px);}
    100%{transform:scale(1.42) rotate(0deg) translateY(-8px);}
  }
  /* sad: grow big + droop */
  .toy.sad{ animation: growSad 0.9s cubic-bezier(.34,1.2,.64,1) forwards; }
  @keyframes growSad{
    0%{transform:scale(1) rotate(0deg);}
    45%{transform:scale(1.5) rotate(-4deg) translateY(-8px);}
    70%{transform:scale(1.32) rotate(3deg) translateY(2px);}
    100%{transform:scale(1.38) rotate(-2deg) translateY(4px);}
  }

  .speech-bubble{
    position:absolute;
    top:-6px;
    left:50%;
    transform:translateX(-50%) scale(0);
    background:#fff;
    border:4px solid var(--ink);
    border-radius:24px;
    padding:10px 22px;
    font-family:'Black Han Sans', sans-serif;
    font-size:1.3rem;
    white-space:nowrap;
    box-shadow:0 5px 0 rgba(0,0,0,0.15);
    z-index:10;
    animation: bubblePop 0.5s cubic-bezier(.34,1.56,.64,1) 0.25s forwards;
  }
  .speech-bubble::after{
    content:'';
    position:absolute;
    bottom:-14px;
    left:50%;
    transform:translateX(-50%);
    border-width:14px 10px 0 10px;
    border-style:solid;
    border-color:var(--ink) transparent transparent transparent;
  }
  .speech-bubble::before{
    content:'';
    position:absolute;
    bottom:-9px;
    left:50%;
    transform:translateX(-50%);
    border-width:11px 7px 0 7px;
    border-style:solid;
    border-color:#fff transparent transparent transparent;
    z-index:1;
  }
  .speech-bubble.correct{ color:var(--green); }
  .speech-bubble.wrong{ color:var(--red); }
  @keyframes bubblePop{
    0%{transform:translateX(-50%) scale(0) rotate(-8deg);}
    60%{transform:translateX(-50%) scale(1.15) rotate(3deg);}
    100%{transform:translateX(-50%) scale(1) rotate(0deg);}
  }

  .sparkle{
    position:absolute;
    font-size:1.4rem;
    animation: sparkleUp 1s ease-out forwards;
    pointer-events:none;
  }
  @keyframes sparkleUp{
    0%{opacity:1; transform:translateY(0) scale(0.6);}
    100%{opacity:0; transform:translateY(-40px) scale(1.3);}
  }

  .teardrop{
    position:absolute;
    font-size:1.1rem;
    animation: tearFall 1.3s ease-in forwards;
    pointer-events:none;
  }
  @keyframes tearFall{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(30px);}
  }

  /* ---------- BADGE MODAL ---------- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(58,42,26,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .badge-card{
    background:var(--cream);
    border-radius:30px;
    border:6px solid var(--red);
    padding:32px 26px;
    text-align:center;
    max-width:380px;
    box-shadow:0 14px 0 var(--red-dark), 0 20px 30px rgba(0,0,0,0.35);
    animation: badgePop 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes badgePop{
    0%{transform:scale(0.3) rotate(-15deg); opacity:0;}
    100%{transform:scale(1) rotate(0deg); opacity:1;}
  }
  .badge-medal{
    font-size:5rem;
    margin-bottom:10px;
    display:inline-block;
    animation: medalSpin 1.2s ease-in-out;
  }
  @keyframes medalSpin{
    0%{transform:rotateY(0deg) scale(0.5);}
    100%{transform:rotateY(720deg) scale(1);}
  }
  .badge-title{
    font-family:'Black Han Sans', sans-serif;
    font-size:1.5rem;
    line-height:1.5;
    color:var(--red-dark);
    margin-bottom:12px;
  }
  .badge-desc{
    font-size:1.1rem;
    line-height:1.6;
    margin-bottom:18px;
  }
  .badge-close{
    font-family:'Jua', sans-serif;
    background:var(--green);
    color:#fff;
    border:none;
    border-radius:50px;
    padding:11px 26px;
    font-size:1.05rem;
    cursor:pointer;
    box-shadow:0 5px 0 #357A57;
  }
  .badge-close:active{transform:translateY(3px); box-shadow:0 2px 0 #357A57;}

  /* ---------- 타이머 ---------- */
  .timer-wrap{
    display:flex;
    justify-content:center;
    margin:0 0 14px;
  }
  .timer-box{
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border:4px solid var(--wood);
    border-radius:50px;
    padding:8px 22px;
    box-shadow:0 4px 0 var(--wood-dark);
    font-family:'Black Han Sans', sans-serif;
    font-size:1.5rem;
    color:var(--ink);
    transition: color 0.3s, border-color 0.3s;
  }
  .timer-box.danger{
    color:var(--red);
    border-color:var(--red);
    animation: timerPulse 0.5s ease-in-out infinite;
  }
  @keyframes timerPulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.04);}
  }
  .timer-icon{ font-size:1.3rem; }

  /* ---------- 닉네임 입력 ---------- */
  .nickname-row{
    display:flex;
    gap:8px;
    margin:14px 0 14px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .nickname-input{
    font-family:'Noto Sans KR', sans-serif;
    font-weight:800;
    font-size:1.05rem;
    border:3px solid var(--wood);
    border-radius:14px;
    padding:9px 14px;
    width:170px;
    outline:none;
    background:var(--cream);
    box-shadow:0 3px 0 var(--wood);
    color:var(--ink);
  }
  .nickname-input:focus{border-color:var(--sky); box-shadow:0 3px 0 #5BA8C9;}
  .nickname-submit{
    font-family:'Jua', sans-serif;
    font-size:1rem;
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:14px;
    padding:9px 18px;
    cursor:pointer;
    box-shadow:0 4px 0 var(--red-dark);
    transition:transform 0.1s;
  }
  .nickname-submit:active{transform:translateY(3px); box-shadow:0 1px 0 var(--red-dark);}

  /* ---------- 명예의 전당 ---------- */
  .hall-wrap{
    max-width:760px;
    margin:0 auto 40px;
    position:relative;
    z-index:1;
  }
  .hall-title{
    font-family:'Black Han Sans', sans-serif;
    font-size:1.6rem;
    text-align:center;
    color:var(--ink);
    background:linear-gradient(160deg, #FFE17D, #FFB23D);
    border:5px solid var(--wood);
    border-radius:20px 20px 0 0;
    padding:14px 10px 10px;
    box-shadow:0 4px 0 var(--wood-dark);
    letter-spacing:2px;
  }
  .hall-list{
    background:var(--cream);
    border:5px solid var(--wood);
    border-top:none;
    border-radius:0 0 20px 20px;
    padding:16px 16px 10px;
    min-height:80px;
    box-shadow:0 6px 0 var(--wood-dark);
  }
  .hall-empty{
    text-align:center;
    color:#aaa;
    font-size:1.05rem;
    padding:18px 0;
    font-weight:800;
  }
  .hall-entry{
    display:flex;
    align-items:center;
    gap:10px;
    background:#fff;
    border:3px solid var(--wood);
    border-radius:14px;
    padding:10px 14px;
    margin-bottom:10px;
    box-shadow:0 3px 0 var(--wood);
    animation: entrySlide 0.4s cubic-bezier(.34,1.4,.64,1);
  }
  @keyframes entrySlide{
    0%{transform:translateX(-30px); opacity:0;}
    100%{transform:translateX(0); opacity:1;}
  }
  .hall-rank{
    font-family:'Black Han Sans', sans-serif;
    font-size:1.4rem;
    min-width:36px;
    text-align:center;
  }
  .hall-name{
    font-family:'Noto Sans KR', sans-serif;
    font-weight:800;
    font-size:1.05rem;
    flex:1;
    color:var(--ink);
  }
  .hall-time{
    font-family:'Black Han Sans', sans-serif;
    font-size:1.1rem;
    color:var(--red-dark);
    white-space:nowrap;
    background:#FFF3D6;
    border:2px solid #FFB23D;
    border-radius:10px;
    padding:2px 10px;
  }
  .hall-date{
    font-size:0.82rem;
    color:#bbb;
    font-weight:700;
    white-space:nowrap;
  }
  .hall-clear-btn{
    display:block;
    margin:14px auto 0;
    font-family:'Jua', sans-serif;
    font-size:0.9rem;
    background:transparent;
    color:#bbb;
    border:2px dashed #ccc;
    border-radius:50px;
    padding:6px 18px;
    cursor:pointer;
  }
  .hall-clear-btn:hover{color:var(--red); border-color:var(--red);}

  /* ---------- 시작 화면 ---------- */
  .start-overlay{
    position:fixed;
    inset:0;
    background:rgba(58,42,26,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:200;
    padding:20px;
  }
  .start-card{
    background:var(--cream);
    border-radius:36px;
    border:6px solid var(--wood);
    box-shadow:0 14px 0 var(--wood-dark), 0 20px 40px rgba(0,0,0,0.35);
    padding:40px 32px 36px;
    text-align:center;
    max-width:400px;
    width:100%;
    animation: startCardIn 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes startCardIn{
    0%{transform:scale(0.5) translateY(40px); opacity:0;}
    100%{transform:scale(1) translateY(0); opacity:1;}
  }
  .start-mascots{
    font-size:2.8rem;
    margin-bottom:10px;
    display:flex;
    justify-content:center;
    gap:12px;
  }
  .start-mascots span{
    display:inline-block;
    animation: mascotBob 1.8s ease-in-out infinite;
  }
  .start-mascots span:nth-child(2){ animation-delay:0.3s; }
  .start-mascots span:nth-child(3){ animation-delay:0.6s; }
  .start-mascots span:nth-child(4){ animation-delay:0.9s; }
  @keyframes mascotBob{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
  }
  .start-title{
    font-family:'Black Han Sans', sans-serif;
    font-size:1.7rem;
    color:var(--red-dark);
    line-height:1.4;
    margin-bottom:8px;
  }
  .start-desc{
    font-family:'Noto Sans KR', sans-serif;
    font-weight:800;
    font-size:1rem;
    color:#888;
    margin-bottom:28px;
    line-height:1.6;
  }
  .start-btn{
    font-family:'Black Han Sans', sans-serif;
    font-size:1.6rem;
    color:#fff;
    background:linear-gradient(160deg, #FF7A5C, var(--red));
    border:none;
    border-radius:50px;
    padding:18px 48px;
    cursor:pointer;
    box-shadow:0 8px 0 var(--red-dark), 0 12px 20px rgba(200,50,30,0.3);
    letter-spacing:2px;
    white-space:nowrap;
    transition:transform 0.15s, box-shadow 0.15s;
    animation: startBtnPulse 2s ease-in-out infinite;
  }

const TOY_BUILDERS = [cowboyToySVG, astroToySVG, piggyToySVG, rexToySVG];

function renderToyStage(face){
  const stage = document.getElementById('toyStage');
  stage.innerHTML = '';
  TOY_BUILDERS.forEach((builder, i)=>{
    const div = document.createElement('div');
    div.className = 'toy ' + (face==='happy' ? 'happy' : face==='sad' ? 'sad' : 'idle');
    div.style.animationDelay = (i*0.12)+'s';
    div.innerHTML = builder(face);
    stage.appendChild(div);
  });

  if(face === 'happy' || face === 'sad'){
    const bubble = document.createElement('div');
    bubble.className = 'speech-bubble ' + (face==='happy' ? 'correct' : 'wrong');
    bubble.textContent = face==='happy' ? '정답입니다! 🎉' : '틀렸습니다 ㅠㅠ';
    stage.appendChild(bubble);
  }
}

function burstEffect(type){
  const stage = document.getElementById('toyStage');
  const rect = stage.getBoundingClientRect();
  const symbols = type==='happy' ? ['✨','⭐','🎉','💫'] : ['💧','😢'];
  for(let i=0;i<10;i++){
    const el = document.createElement('div');
    el.className = type==='happy' ? 'sparkle' : 'teardrop';
    el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    el.style.left = (20 + Math.random()*(rect.width-40))+'px';
    el.style.top = (Math.random()*40)+'px';
    el.style.animationDelay = (Math.random()*0.4)+'s';
    stage.appendChild(el);
    setTimeout(()=>el.remove(), 1600);
  }
}

/* ===================== 상태 ===================== */
let currentQ = null;
let selectedIndex = null;
let answered = false;
let correctCount = 0;
const TOTAL_SLOTS = 5;
let usedIds = [];

/* ===================== 타이머 ===================== */
let timerInterval = null;
let elapsedSeconds = 0;
let timerRunning = false;

function formatTime(sec){
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function startTimer(){
  if(timerRunning) return;
  timerRunning = true;
  elapsedSeconds = 0;
  updateTimerDisplay();
  timerInterval = setInterval(()=>{
    elapsedSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function stopTimer(){
  clearInterval(timerInterval);
  timerRunning = false;
}

function resetTimer(){
  stopTimer();
  elapsedSeconds = 0;
  updateTimerDisplay();
  document.getElementById('timerBox').classList.remove('danger');
}

function updateTimerDisplay(){
  const display = document.getElementById('timerDisplay');
  if(display) display.textContent = formatTime(elapsedSeconds);
  // 2분 넘으면 위험 표시
  const box = document.getElementById('timerBox');
  if(box){
    if(elapsedSeconds >= 120) box.classList.add('danger');
    else box.classList.remove('danger');
  }
}

/* ===================== 렌더링 ===================== */
function initProgress(){
  const row = document.getElementById('progressRow');
  row.innerHTML = '';
  for(let i=0;i<TOTAL_SLOTS;i++){
    const slot = document.createElement('div');
    slot.className = 'progress-slot';
    slot.id = 'slot-'+i;
    slot.textContent = '';
    row.appendChild(slot);
  }
}

function fillNextSlot(){
  if(correctCount > TOTAL_SLOTS) return;
  const idx = correctCount - 1;
  const slot = document.getElementById('slot-'+idx);
  if(slot){
    slot.classList.add('filled');
    slot.textContent = '⭐';
  }
}

function pickQuestion(){
  let pool = QUESTIONS.filter(q => !usedIds.includes(q.id));
  if(pool.length === 0){
    usedIds = [];
    pool = QUESTIONS;
  }
  const q = pool[Math.floor(Math.random()*pool.length)];
  usedIds.push(q.id);
  return q;
}

function loadQuestion(){
  currentQ = pickQuestion();
  selectedIndex = null;
  answered = false;

  const qNum = (correctCount % TOTAL_SLOTS) + 1;
  document.getElementById('qNumber').textContent = '문제 ' + qNum;
  // 타이머는 시작하기 버튼 또는 startNewRound에서만 시작
  document.getElementById('qText').textContent = currentQ.text;
  document.getElementById('qText').textContent = currentQ.text;

  const sceneEl = document.getElementById('qScene');
  sceneEl.innerHTML = '';
  currentQ.scene.forEach(item=>{
    const box = document.createElement('div');
    box.style.textAlign = 'center';
    box.innerHTML = item.svg + `<div style="font-family:'Jua',sans-serif; margin-top:4px; color:#3A2A1A;">${item.label}</div>`;
    sceneEl.appendChild(box);
  });

  const bogiEl = document.getElementById('bogiBox');
  bogiEl.innerHTML = currentQ.bogi.map(line=>`<div>${line}</div>`).join('');

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  currentQ.choices.forEach((choice, i)=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `① ② ③ ④ ⑤`.split(' ')[i] + ' ' + choice;
    btn.dataset.index = i;
    btn.addEventListener('click', ()=>{
      if(answered) return;
      document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedIndex = i;
    });
    choicesEl.appendChild(btn);
  });

  document.getElementById('feedback').classList.remove('show','correct','wrong');
  document.getElementById('checkBtn').disabled = false;
  renderToyStage('idle');
}

function showFeedback(isCorrect){
  const fb = document.getElementById('feedback');
  const title = document.getElementById('feedbackTitle');
  const body = document.getElementById('feedbackBody');
  fb.classList.remove('correct','wrong');
  fb.classList.add('show', isCorrect ? 'correct' : 'wrong');
  title.textContent = isCorrect ? '🎉 정답이에요!' : '😢 아쉬워요!';
  body.textContent = currentQ.explain;
}

function handleCheck(){
  if(answered) return;
  if(selectedIndex === null){
    alert('보기 중 하나를 선택해주세요!');
    return;
  }
  answered = true;
  document.getElementById('checkBtn').disabled = true;

  const isCorrect = selectedIndex === currentQ.answerIndex;

  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled = true;
    if(i === currentQ.answerIndex){
      b.classList.add('correct-answer');
    } else if(i === selectedIndex && !isCorrect){
      b.classList.add('wrong-answer');
    }
  });

  renderToyStage(isCorrect ? 'happy' : 'sad');
  burstEffect(isCorrect ? 'happy' : 'sad');
  showFeedback(isCorrect);

  if(isCorrect){
    correctCount++;
    fillNextSlot();
    if(correctCount > 0 && correctCount % TOTAL_SLOTS === 0){
      stopTimer();
      const finalTime = elapsedSeconds;
      setTimeout(()=>{
        // 배지에 완료 시간 표시
        const ftDisplay = document.getElementById('finalTimeDisplay');
        if(ftDisplay) ftDisplay.textContent = formatTime(finalTime);
        launchFireworks();
        document.getElementById('badgeOverlay').classList.add('show');
      }, 900);
    }
  }
}

function resetProgressIfBadgeClosed(){
  document.querySelectorAll('.progress-slot').forEach(slot=>{
    slot.classList.remove('filled');
    slot.textContent = '';
  });
}

/* ===================== 폭죽 ===================== */
let fireworksTimer = null;
function launchFireworks(){
  const canvas = document.getElementById('fireworksCanvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const COLORS = ['#FF4E4E','#FFD700','#4ECAFF','#7BFF4E','#FF9AEB','#FF8C00','#00FFD1','#FF4EAA'];
  const particles = [];

  function spawnBurst(x, y){
    const count = 90 + Math.floor(Math.random()*40);
    for(let i=0;i<count;i++){
      const angle = (Math.PI*2/count)*i + (Math.random()-0.5)*0.4;
      const speed = 3 + Math.random()*8;
      particles.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        alpha: 1,
        color: COLORS[Math.floor(Math.random()*COLORS.length)],
        size: 2 + Math.random()*4,
        gravity: 0.12 + Math.random()*0.1,
        decay: 0.012 + Math.random()*0.01,
        trail: [],
        type: Math.random()<0.3 ? 'star' : 'circle'
      });
    }
  }

  let t = 0;
  function drawStar(ctx, x, y, r, color){
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a = (Math.PI*2/5)*i - Math.PI/2;
      const b = a + Math.PI/5;
      ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
      ctx.lineTo(Math.cos(b)*(r*0.45), Math.sin(b)*(r*0.45));
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.restore();
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // 팡팡팡 — 랜덤 위치에서 연속 발사
    t++;
    if(t % 22 === 0 || t === 1 || t === 10){
      const x = canvas.width * (0.15 + Math.random()*0.7);
      const y = canvas.height * (0.1 + Math.random()*0.45);
      spawnBurst(x, y);
    }

    for(let i = particles.length-1; i>=0; i--){
      const p = particles[i];
      p.trail.push({x:p.x, y:p.y, alpha:p.alpha});
      if(p.trail.length > 6) p.trail.shift();
      p.vx *= 0.98;
      p.vy = p.vy * 0.98 + p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.alpha -= p.decay;
      if(p.alpha <= 0){ particles.splice(i,1); continue; }
      // 꼬리
      for(let j=0;j<p.trail.length;j++){
        ctx.globalAlpha = (p.trail[j].alpha * j/p.trail.length) * 0.4;
        ctx.beginPath();
        ctx.arc(p.trail[j].x, p.trail[j].y, p.size*0.5, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }
      ctx.globalAlpha = p.alpha;
      if(p.type === 'star'){
        drawStar(ctx, p.x, p.y, p.size*1.5, p.color);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    if(t < 260){
      requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      canvas.style.display = 'none';
      particles.length = 0;
    }
  }
  animate();
}

/* ===================== 명예의 전당 ===================== */
const HALL_KEY = 'physics_hall_of_fame';

function loadHall(){
  try{
    return JSON.parse(localStorage.getItem(HALL_KEY) || '[]');
  }catch(e){ return []; }
}

function saveHall(hall){
  try{ localStorage.setItem(HALL_KEY, JSON.stringify(hall)); }catch(e){}
}

function addToHall(name){
  const hall = loadHall();
  const now = new Date();
  const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  hall.push({ name, date: dateStr, seconds: elapsedSeconds });
  // 시간 빠른 순으로 정렬 (오름차순)
  hall.sort((a,b) => (a.seconds||9999) - (b.seconds||9999));
  if(hall.length > 20) hall.pop();
  saveHall(hall);
  renderHall();
}

const RANK_ICONS = ['🥇','🥈','🥉','🏅','🏅','⭐','⭐','⭐','⭐','⭐'];

function renderHall(){
  const list = document.getElementById('hallList');
  const hall = loadHall();
  if(hall.length === 0){
    list.innerHTML = '<div class="hall-empty">아직 아무도 없어요...<br>첫 번째 물리박사가 되어보세요! 🔬</div>';
    return;
  }
  list.innerHTML = hall.map((entry, i) => `
    <div class="hall-entry">
      <span class="hall-rank">${RANK_ICONS[i] || '🌟'}</span>
      <span class="hall-name">${escapeHtml(entry.name)}</span>
      <span class="hall-time">⏱️ ${entry.seconds != null ? formatTime(entry.seconds) : '--:--'}</span>
      <span class="hall-date">${entry.date}</span>
    </div>
  `).join('');
}

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ===================== 초기화 (안전 실행) ===================== */
function startNewRound(){
  resetProgressIfBadgeClosed();
  resetTimer();
  correctCount = 0;
  usedIds = [];
  loadQuestion();
  startTimer();
}

function initApp(){
  try{
    // 시작하기 버튼
    document.getElementById('startBtn').addEventListener('click', ()=>{
      const overlay = document.getElementById('startOverlay');
      overlay.classList.add('hide');

      startTimer();
    });

    document.getElementById('newBtn').addEventListener('click', ()=>{
      loadQuestion();
    });

    // 배지 닫기: 새 라운드 시작 (타이머 리셋)

    });

      startNewRound();
      setTimeout(()=>{

    });

    document.getElementById('nicknameInput').addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') document.getElementById('nicknameSubmitBtn').click();
    });

    // 기록 초기화: confirm 없이 바로 삭제
    document.getElementById('hallClearBtn').addEventListener('click', ()=>{
      localStorage.removeItem(HALL_KEY);
      renderHall();
    });

    initProgress();
    loadQuestion();
    renderHall();

  }catch(err){
    console.error('초기화 중 오류:', err);
    const qText = document.getElementById('qText');
    if(qText) qText.textContent = '문제를 불러오는 중 오류가 발생했어요. 새로고침 해주세요.';
  }
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', initApp);
}else{
  initApp();
}
</script>
</body>
</html>
