<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점전하 전기장 시뮬레이션</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --surface2: #ebebeb;
    --border: #cccccc;
    --accent: #222222;
    --accent2: #444444;
    --positive: #111111;
    --negative: #555555;
    --neutral: #888888;
    --text: #111111;
    --text-dim: #777777;
    --green: #222222;
    --red: #444444;
    --yellow: #333333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  .badge {
    display: inline-block;
    background: #222222;
    color: #ffffff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .main-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 820px;
    margin-bottom: 20px;
  }

  .problem-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .problem-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 1px;
  }

  .new-btn {
    background: #222222;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .new-btn:hover { transform: translateY(-1px); opacity: 0.9; }
  .new-btn:active { transform: translateY(0); }

  .problem-body {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 600px) {
    .problem-body { grid-template-columns: 1fr; }
  }

  .problem-text {
    font-size: 15px;
    line-height: 1.9;
    color: var(--text);
  }

  .problem-text .val {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 600;
  }

  .problem-text .valQ {
    font-family: 'JetBrains Mono', monospace;
    color: var(--yellow);
    font-weight: 700;
  }

  /* SVG diagram */
  .diagram-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    min-width: 244px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Answer choices */
  .choices-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 22px;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .choices {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .choice-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 80px;
    text-align: center;
  }

  .choice-btn:hover {
    border-color: #222222;
    color: #222222;
    background: #e8e8e8;
  }

  .choice-btn.selected {
    border-color: #111111;
    color: #111111;
    background: #d8d8d8;
  }

  .choice-btn.correct {
    border-color: #111111;
    color: #111111;
    background: #d0d0d0;
    font-weight: 800;
  }

  .choice-btn.wrong {
    border-color: #888888;
    color: #888888;
    background: #f0f0f0;
    text-decoration: line-through;
  }

  .choice-btn:disabled { cursor: default; }

  /* Submit button */
  .submit-wrap {
    margin-top: 18px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .submit-btn {
    background: #222222;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 11px 28px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }

  .submit-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* Feedback */
  .feedback {
    margin-top: 22px;
    border-radius: 14px;
    padding: 20px 22px;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: #e8e8e8;
    border: 1.5px solid #999999;
  }

  .feedback.wrong-fb {
    background: #f0f0f0;
    border: 1.5px solid #bbbbbb;
  }

  .fb-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fb-title.c { color: var(--green); }
  .fb-title.w { color: var(--red); }

  .fb-section {
    margin-bottom: 12px;
  }

  .fb-section-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .fb-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }

  .fb-math {
    font-family: 'JetBrains Mono', monospace;
    background: #e0e0e0;
    border: 1px solid #bbbbbb;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 2;
    margin-top: 8px;
    color: #333333;
    white-space: pre-line;
  }

  .highlight { color: var(--yellow); font-weight: 700; }
  .pos { color: var(--positive); }
  .neg { color: var(--negative); }

  /* stats */
  .stats-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    text-align: center;
    min-width: 80px;
  }

  .stat-val {
    font-size: 20px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: #222222;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  footer {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="badge">2022개정 교육과정 · 물리학</div>
  <h1>점전하의 <span>전기장</span> 시뮬레이션</h1>
  <p class="subtitle">y = 0인 점에서 전기장이 0이 되는 조건으로 Q를 구하세요</p>
</header>

<div class="main-card">
  <div class="problem-header">
    <div>
      <div class="problem-label">문제 유형 · 전기장의 중첩</div>
      <div class="stats-row" style="margin-top:8px;">
        <div class="stat-box"><div class="stat-val" id="totalCount">0</div><div class="stat-label">총 문제</div></div>
        <div class="stat-box"><div class="stat-val" id="correctCount">0</div><div class="stat-label">정답</div></div>
        <div class="stat-box"><div class="stat-val" id="accuracy">—</div><div class="stat-label">정답률</div></div>
      </div>
    </div>
    <button class="new-btn" onclick="generateProblem()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      새 문제
    </button>
  </div>

  <div class="problem-body">
    <div>
      <div class="problem-text" id="problemText"></div>
      <div class="choices-label">Q의 값은?</div>
      <div class="choices" id="choices"></div>
      <div class="submit-wrap">
        <button class="submit-btn" id="submitBtn" onclick="checkAnswer()" disabled>정답 확인</button>
        <span id="selectedLabel" style="font-size:13px;color:var(--text-dim);"></span>
      </div>
    </div>
    <div class="diagram-wrap">
      <svg id="diagram" width="220" height="300" viewBox="0 0 220 300" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
</div>

<footer>문제는 매번 다른 숫자로 자동 생성됩니다 · 원리는 동일합니다</footer>

<script>
  let state = {
    A: 0, B: 0, C: 0,  // charges: +Aq at 2d, Q at d, -Cq at -d
    d: 0,
    correctQ: 0,
    choices: [],
    selected: null,
    answered: false,
    total: 0,
    correct: 0
  };

  // 전기장 조건: y=0에서 E = 0
  // E_A (from +Aq at y=2d) → 방향 -y (아래), 크기 k*Aq/(2d)^2
  // E_Q (from Q at y=d)   → 방향 depends on sign(Q)
  // E_C (from -Cq at y=-d)→ 방향 +y (위, 끌어당김), 크기 k*Cq/d^2
  // Ex: y=0에서 x성분 없음 (모두 y축 위에 있으므로 y방향만)
  // E_y from +Aq at 2d: 밀어냄 → -y: -k*Aq/4d^2
  // E_y from Q at d: sign(Q)*(-1)*k*|Q|/d^2  → 위치가 y>0이면 y=0에서 아래방향이 양전하의 밀어냄
  // 정확하게:
  // E_y_total = 0
  // E from +Aq: at y=0, vector from charge(2d) to origin = (0,-2d), unit vec (0,-1)
  //   E = k(Aq)/(4d^2) * (0,-1) → y component = -kAq/4d^2
  // E from Q: at y=0, vector from charge(d) to origin = (0,-d), unit vec (0,-1)
  //   E = kQ/d^2 * (0,-1) → y component = -kQ/d^2
  // E from -Cq: at y=0, vector from charge(-d) to origin = (0,d), unit vec (0,1)
  //   Force direction: towards -Cq? No, E field from -Cq points toward -Cq
  //   E = k(-Cq)/d^2 * (0,-1)/|(0,-1)| → wait
  //   E = k*(-Cq)/d^2 * (unit vec from -Cq to origin) ... no
  //   E field at origin due to charge q_s at position r_s:
  //   E = k*q_s / |r|^2 * r_hat where r = origin - r_s
  //   For -Cq at y=-d: r = (0,0)-(0,-d) = (0,d), |r|=d, r_hat=(0,1)
  //   E = k*(-Cq)/d^2 * (0,1) → y component = -kCq/d^2
  //
  // Total: -kAq/4d^2 - kQ/d^2 - kCq/d^2 = 0
  // -Aq/4 - Q - Cq = 0
  // Q = -Aq/4 - Cq

  function computeQ(A, C, q) {
    // Q = -A*q/4 - C*q
    return -A * q / 4 - C * q;
  }

  function generateProblem() {
    // Pick A (multiplier for top charge), C (multiplier for bottom charge)
    // A must be divisible by 4 to give clean answer, or we can keep fractions
    // Let's pick A from {4,8,12,16,20}, C from {1,2,3,4}
    const As = [4, 8, 12, 16, 20];
    const Cs = [1, 2, 3, 4, 5];
    const A = As[Math.floor(Math.random() * As.length)];
    const C = Cs[Math.floor(Math.random() * Cs.length)];

    const q = 1; // in units of q
    const correctQ = computeQ(A, C, q); // in units of q
    // correctQ = -A/4 - C  (always negative)

    // Generate 5 choices including correct answer
    const correctLabel = formatQ(correctQ);
    const distractors = new Set();
    distractors.add(correctQ);

    // Some plausible distractors
    const candidates = [];
    for (let dq = -A - 2*C; dq <= A + 2*C; dq += 1) {
      candidates.push(dq);
    }
    // shuffle and pick 4 different from correct
    shuffle(candidates);
    for (let v of candidates) {
      if (distractors.size >= 5) break;
      if (!distractors.has(v)) distractors.add(v);
    }

    const choicesArr = Array.from(distractors);
    shuffle(choicesArr);

    state = {
      A, C, correctQ,
      choices: choicesArr,
      selected: null,
      answered: false,
      total: state.total,
      correct: state.correct
    };

    renderProblem();
    renderDiagram();
    clearFeedback();
    updateStats();
  }

  function formatQ(v) {
    if (v === 0) return '0';
    const sign = v > 0 ? '+' : '−';
    const abs = Math.abs(v);
    if (abs === 1) return sign + 'q';
    return sign + abs + 'q';
  }

  function renderProblem() {
    const { A, C } = state;
    const topCharge = '+' + A + 'q';
    const botCharge = (C === 1 ? '\u2212q' : '\u2212' + C + 'q');
    document.getElementById('problemText').innerHTML =
      '그림은 전하량이 <span class="val">' + topCharge + '</span>, <span class="valQ">Q</span>, <span class="val">' + botCharge + '</span>인 세 점전하가<br>'
    + '각각 <span class="val">y = 2d</span>, <span class="val">y = d</span>, <span class="val">y = −d</span>인 점에 고정되어 있는<br>'
    + '것을 나타낸 것이다. <strong>y = 0인 점에서 전기장의<br>세기는 0이다.</strong><br><br>'
    + '<span class="valQ">Q</span>는? (단위: <span class="val">q</span>)';

    // Render choices
    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    state.choices.forEach((v, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = formatQ(v);
      btn.dataset.val = v;
      btn.onclick = () => selectChoice(v, btn);
      choicesEl.appendChild(btn);
    });

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('selectedLabel').textContent = '';
  }

  function renderDiagram() {
    const { A, C } = state;
    const svg = document.getElementById('diagram');

    const W = 220, H = 300;
    const axisX = 90;
    const cx = 90;
    const y0 = 150;
    const dPx = 60;
    const r = 16;

    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);

    // 전하 레이블 — 새 문제마다 A,C 값을 그대로 반영
    const topLabel = '+' + A + 'q';
    const botLabel = (C === 1 ? '' : C) + '\u2212q'.replace('\u2212', '\u2212');
    const botDisplay = (C === 1 ? '\u2212q' : '\u2212' + C + 'q');
    const topFS = topLabel.length >= 5 ? 8 : 10;
    const botFS = botDisplay.length >= 4 ? 8 : 10;

    const yAt2d = y0 - 2 * dPx;
    const yAtd  = y0 - dPx;
    const yAtmd = y0 + dPx;

    function mkTick(y, lbl) {
      return '<line x1="' + (axisX-5) + '" y1="' + y + '" x2="' + (axisX+5) + '" y2="' + y + '" stroke="#555" stroke-width="1.5"/>'
           + '<text x="' + (axisX + r + 8) + '" y="' + (y+4) + '" fill="#444" font-size="11" text-anchor="start" font-family="serif" font-style="italic">' + lbl + '</text>';
    }

    svg.innerHTML =
      // y축
      '<line x1="' + axisX + '" y1="10" x2="' + axisX + '" y2="' + (H-10) + '" stroke="#555" stroke-width="1.5"/>'
    + '<polygon points="' + (axisX-4) + ',16 ' + axisX + ',6 ' + (axisX+4) + ',16" fill="#555"/>'
    + '<text x="' + (axisX+18) + '" y="12" fill="#333" font-size="13" font-family="serif" font-style="italic">y</text>'
    + mkTick(yAt2d, '2d')
    + mkTick(yAtd,  'd')
    + mkTick(y0,    '0')
    + mkTick(yAtmd, '\u2212d')
    // 입자 1: +Aq at y=2d (진한 회색)
    + '<circle cx="' + cx + '" cy="' + yAt2d + '" r="' + r + '" fill="#d8d8d8" stroke="#111" stroke-width="1.8"/>'
    + '<text x="' + cx + '" y="' + yAt2d + '" fill="#111" font-size="' + topFS + '" text-anchor="middle" dominant-baseline="middle" font-weight="700" font-family="sans-serif">' + topLabel + '</text>'
    // 입자 2: Q at y=d (점선, 미지수)
    + '<circle cx="' + cx + '" cy="' + yAtd + '" r="' + r + '" fill="#f2f2f2" stroke="#555" stroke-width="1.8" stroke-dasharray="4,2"/>'
    + '<text x="' + cx + '" y="' + yAtd + '" fill="#333" font-size="11" text-anchor="middle" dominant-baseline="middle" font-weight="700" font-family="sans-serif">Q</text>'
    // 입자 3: −Cq at y=−d (중간 회색)
    + '<circle cx="' + cx + '" cy="' + yAtmd + '" r="' + r + '" fill="#c0c0c0" stroke="#111" stroke-width="1.8"/>'
    + '<text x="' + cx + '" y="' + yAtmd + '" fill="#111" font-size="' + botFS + '" text-anchor="middle" dominant-baseline="middle" font-weight="700" font-family="sans-serif">' + botDisplay + '</text>'
    // E=0 점
    + '<circle cx="' + axisX + '" cy="' + y0 + '" r="4" fill="#222"/>'
    + '<text x="' + (axisX+9) + '" y="' + (y0-6) + '" fill="#333" font-size="9" font-family="sans-serif">E=0</text>';
  }

  function selectChoice(val, btn) {
    if (state.answered) return;
    state.selected = val;

    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    document.getElementById('submitBtn').disabled = false;
    document.getElementById('selectedLabel').textContent = `선택: ${formatQ(val)}`;
  }

  function checkAnswer() {
    if (state.answered || state.selected === null) return;
    state.answered = true;
    state.total++;

    const isCorrect = state.selected === state.correctQ;
    if (isCorrect) state.correct++;

    // Style buttons
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.disabled = true;
      const v = parseInt(btn.dataset.val);
      if (v === state.correctQ) btn.classList.add('correct');
      else if (v === state.selected && !isCorrect) btn.classList.add('wrong');
      btn.classList.remove('selected');
    });

    document.getElementById('submitBtn').disabled = true;
    showFeedback(isCorrect);
    updateStats();
  }

  function showFeedback(isCorrect) {
    const fb = document.getElementById('feedback');
    const { A, C, correctQ } = state;

    const qCorrect = formatQ(correctQ);

    fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
    fb.innerHTML = `
      <div class="fb-title ${isCorrect ? 'c' : 'w'}">
        ${isCorrect ? '✓ 정답입니다!' : '✗ 오답입니다.'}
        ${!isCorrect ? `<span style="font-size:14px;font-weight:400;color:#666666">정답: <strong style="color:#111111">${qCorrect}</strong></span>` : ''}
      </div>

      <div class="fb-section">
        <div class="fb-section-title">📌 풀이 원리</div>
        <div class="fb-text">
          y = 0인 점에서 세 점전하가 만드는 전기장의 벡터 합이 0이어야 합니다.<br>
          모든 전하가 y축 위에 있으므로, y축 방향 성분만 고려합니다.
        </div>
      </div>

      <div class="fb-section">
        <div class="fb-section-title">📐 각 전하의 전기장 (y=0에서)</div>
        <div class="fb-math"
>전하 +${A}q (y=2d):  벡터 r = (0,0)−(0,2d) = (0,−2d)
  → E₁ = k·(${A}q)/(2d)² × (0,−1) = −k·${A}q/4d² (아래↓)

전하 Q (y=d):   벡터 r = (0,0)−(0,d) = (0,−d)
  → E₂ = k·Q/d² × (0,−1) = −kQ/d²

전하 −q (y=−d):  벡터 r = (0,0)−(0,−d) = (0,+d)
  → E₃ = k·(−q)/d² × (0,+1) = −kq/d² (아래↓)</div>
      </div>

      <div class="fb-section">
        <div class="fb-section-title">🔢 방정식 풀기</div>
        <div class="fb-math"
>E₁ + E₂ + E₃ = 0

  −k·${A}q/4d²  −  kQ/d²  −  kq/d²  = 0

양변을 k/d²으로 나누면:

  −${A}q/4  −  Q  −  q  = 0

  Q = −${A}q/4 − q = <span class="highlight">${A > 4 ? `−${A/4}q − q = ` : ''}${qCorrect}</span></div>
      </div>

      <div class="fb-section">
        <div class="fb-section-title">💡 핵심 개념</div>
        <div class="fb-text">
          • 전기장은 <strong>벡터</strong>이므로 각 전하의 전기장을 <strong>방향 포함하여 합산</strong>합니다.<br>
          • 점전하의 전기장: <strong style="color:#222222">E = kq/r²</strong>, 방향은 전하→관찰점 방향<br>
          • Q < 0이므로, Q의 전기장은 계산된 방향의 <strong>반대</strong>로 작용했습니다.
        </div>
      </div>
    `;
  }

  function clearFeedback() {
    const fb = document.getElementById('feedback');
    fb.className = 'feedback';
    fb.innerHTML = '';
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = state.total;
    document.getElementById('correctCount').textContent = state.correct;
    document.getElementById('accuracy').textContent = state.total > 0
      ? Math.round(state.correct / state.total * 100) + '%' : '—';
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Init
  generateProblem();
</script>
