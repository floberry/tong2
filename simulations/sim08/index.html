<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2022 물리학 시뮬레이션 학습 게임</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#0a0015;
  min-height:100vh;
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  display:flex; align-items:center; justify-content:center;
  padding:20px; overflow-x:hidden;
}

#sparkle-canvas {
  position:fixed; inset:0; pointer-events:none; z-index:0;
}

.game-container {
  width:100%; max-width:500px;
  display:flex; flex-direction:column; gap:14px;
  position:relative; z-index:1;
}

/* ── 그림 카드 (네온 테두리) ── */
.vis-card {
  border-radius:22px; padding:22px 18px;
  background:rgba(20,0,40,0.85);
  border:2px solid #ff00cc;
  box-shadow:
    0 0 12px #ff00cc,
    0 0 30px #ff00ccaa,
    0 0 60px #ff00cc44,
    inset 0 0 20px rgba(255,0,200,0.08);
  position:relative; overflow:hidden;
}
.vis-card::before {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,0,200,0.05),rgba(0,200,255,0.05));
  pointer-events:none;
}

.vis-inner {
  display:flex; align-items:center; justify-content:center; gap:0;
}

.charge-box {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  flex-shrink:0;
}

/* +Q 전하 (핑크 네온) */
.charge-src-circle {
  width:60px; height:60px; border-radius:50%;
  background:rgba(10,0,30,0.9);
  border:3px solid #ff00aa;
  box-shadow:
    0 0 10px #ff00aa,
    0 0 25px #ff00aacc,
    0 0 50px #ff00aa66,
    inset 0 0 15px rgba(255,0,170,0.3);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:16px;
  color:#ff66dd;
  text-shadow:0 0 8px #ff00aa, 0 0 20px #ff00aa;
  animation:pulseSrc 2s ease-in-out infinite;
}
@keyframes pulseSrc {
  0%,100%{ box-shadow:0 0 10px #ff00aa,0 0 25px #ff00aacc,0 0 50px #ff00aa66,inset 0 0 15px rgba(255,0,170,0.3); }
  50%    { box-shadow:0 0 20px #ff00aa,0 0 50px #ff00aaff,0 0 90px #ff00aaaa,inset 0 0 25px rgba(255,0,170,0.5); }
}

.charge-src-label {
  color:#ff66dd; font-size:12px; font-weight:700;
  text-shadow:0 0 6px #ff00aa;
}

/* 전하 A (시안 네온) */
.charge-tgt-circle {
  width:60px; height:60px; border-radius:50%;
  background:rgba(10,0,30,0.9);
  border:3px solid #00eeff;
  box-shadow:
    0 0 10px #00eeff,
    0 0 25px #00eeffcc,
    0 0 50px #00eeff66,
    inset 0 0 15px rgba(0,238,255,0.3);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:14px;
  color:#88ffff;
  text-shadow:0 0 8px #00eeff, 0 0 20px #00eeff;
  animation:pulseTgt 2s ease-in-out infinite 0.5s;
}
@keyframes pulseTgt {
  0%,100%{ box-shadow:0 0 10px #00eeff,0 0 25px #00eeffcc,0 0 50px #00eeff66,inset 0 0 15px rgba(0,238,255,0.3); }
  50%    { box-shadow:0 0 20px #00eeff,0 0 50px #00eeffff,0 0 90px #00eeffaa,inset 0 0 25px rgba(0,238,255,0.5); }
}
.charge-tgt-label {
  color:#88ffff; font-size:12px; font-weight:700;
  text-shadow:0 0 6px #00eeff;
}

/* 중간 화살표 영역 */
.mid-section {
  flex:1; display:flex; flex-direction:column;
  align-items:center; gap:5px; padding:0 10px;
}

.dist-label {
  font-size:15px; font-weight:800;
  padding:4px 14px; border-radius:20px;
  border:2px solid #ffff00;
  color:#ffff66;
  background:rgba(255,255,0,0.08);
  text-shadow:0 0 8px #ffff00, 0 0 20px #ffff00;
  box-shadow:0 0 10px #ffff0066, 0 0 24px #ffff0033;
  animation:distGlow 1.5s ease-in-out infinite alternate;
}
@keyframes distGlow {
  0% { box-shadow:0 0 10px #ffff0066,0 0 24px #ffff0033; }
  100%{ box-shadow:0 0 20px #ffff00cc,0 0 44px #ffff0077; }
}

.arrow-row {
  display:flex; align-items:center; width:100%; position:relative;
}
.arrow-shaft {
  flex:1; height:3px;
  background:linear-gradient(90deg,#ff00aa,#ffffff,#00eeff);
  box-shadow:0 0 6px #fff, 0 0 14px #ff88dd;
  border-radius:2px;
}
.arrow-head-l { color:#ff88dd; font-size:18px; text-shadow:0 0 8px #ff00aa; line-height:1; }
.arrow-head-r { color:#88ffff; font-size:18px; text-shadow:0 0 8px #00eeff; line-height:1; }

.force-tag {
  font-size:14px; font-weight:800;
  padding:4px 14px; border-radius:20px;
  border:2px solid #ff6600;
  color:#ffaa44;
  background:rgba(255,100,0,0.1);
  text-shadow:0 0 8px #ff6600, 0 0 18px #ff6600;
  box-shadow:0 0 10px #ff660066, 0 0 24px #ff660033;
  animation:forceGlow 1.5s ease-in-out infinite alternate;
}
@keyframes forceGlow {
  0% { box-shadow:0 0 10px #ff660066,0 0 24px #ff660033; }
  100%{ box-shadow:0 0 22px #ff6600cc,0 0 44px #ff660077; }
}

.unknown-dist {
  border-color:#ffff00 !important; color:#ffff00 !important;
  text-shadow:0 0 12px #ffff00, 0 0 30px #ffff00 !important;
  font-size:18px !important;
}
.unknown-force {
  border-color:#ff6600 !important; color:#ff8800 !important;
  text-shadow:0 0 12px #ff6600, 0 0 30px #ff6600 !important;
  font-size:18px !important;
}
.unknown-tgt {
  border-color:#00eeff !important;
  color:#00ffff !important;
  font-size:18px !important;
}

/* ── 질문 카드 ── */
.question-card {
  border-radius:20px; padding:20px;
  background:rgba(20,0,40,0.88);
  border:2px solid #ff44aa;
  box-shadow:0 0 14px #ff44aa88,0 0 30px #ff44aa33;
}
.question-title {
  color:#ff88dd; font-size:13px; font-weight:700;
  margin-bottom:10px; display:flex; align-items:center; gap:6px;
  text-shadow:0 0 6px #ff44aa;
}
.question-text {
  color:#ffddee; font-size:15px; line-height:1.9; margin-bottom:16px;
}
.hl {
  background:rgba(255,0,170,0.18); color:#ff88ff;
  padding:2px 8px; border-radius:8px; font-weight:700;
  border:1px solid #ff00aaaa;
  text-shadow:0 0 6px #ff00aa;
}
.hl-q {
  background:rgba(255,200,0,0.18); color:#ffdd55;
  padding:2px 8px; border-radius:8px; font-weight:700;
  border:1px solid #ffdd0088;
  text-shadow:0 0 6px #ffcc00;
}

/* ── 선택지 ── */
.choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.choice-btn {
  background:rgba(30,0,60,0.9);
  border:2px solid #aa44ff;
  border-radius:14px; padding:16px;
  font-size:16px; font-weight:700; color:#cc88ff;
  cursor:pointer; transition:all 0.18s; text-align:center;
  text-shadow:0 0 6px #aa44ff;
  box-shadow:0 0 8px #aa44ff44;
}
.choice-btn:hover:not(:disabled) {
  background:rgba(180,0,255,0.2);
  color:#ffffff; border-color:#ff00ff;
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 0 16px #ff00ff88, 0 0 32px #ff00ff44;
  text-shadow:0 0 10px #fff;
}

/* 정답 네온 – 계속 빛남 */
.choice-btn.correct {
  background:rgba(0,255,120,0.15);
  color:#00ff88; border-color:#00ff88;
  text-shadow:0 0 10px #00ff88, 0 0 20px #00ff88;
  animation:correctNeon 0.8s ease-in-out infinite alternate;
}
@keyframes correctNeon {
  0% { box-shadow:0 0 10px #00ff88,0 0 24px #00ff8888,0 0 50px #00ff8844; }
  100%{ box-shadow:0 0 22px #00ff88,0 0 50px #00ff88cc,0 0 90px #00ff88aa; }
}
.choice-btn.wrong {
  background:rgba(255,40,40,0.2);
  color:#ff6666; border-color:#ff3333;
  text-shadow:0 0 8px #ff3333;
  box-shadow:0 0 14px #ff333388;
}
.choice-btn:disabled { cursor:not-allowed; }

/* ── 풀이 카드 ── */
.solution-card {
  border-radius:20px; padding:20px;
  background:rgba(0,10,30,0.92);
  border:2px solid #00ffcc;
  box-shadow:0 0 16px #00ffcc88, 0 0 36px #00ffcc33;
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:max-height 0.55s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease, padding 0.4s ease;
  padding-top:0; padding-bottom:0;
}
.solution-card.show {
  max-height:600px;
  opacity:1;
  padding-top:20px;
  padding-bottom:20px;
}
.solution-title {
  color:#00ffcc; font-size:13px; font-weight:700;
  margin-bottom:12px; display:flex; align-items:center; gap:6px;
  text-shadow:0 0 8px #00ffcc;
}
.solution-body {
  color:#ccffee; font-size:14px; line-height:2;
}
.sol-step {
  display:flex; align-items:flex-start; gap:10px;
  margin-bottom:8px;
}
.sol-num {
  background:rgba(0,255,200,0.15);
  border:1px solid #00ffcc88;
  color:#00ffcc; font-size:11px; font-weight:800;
  width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; margin-top:2px;
  text-shadow:0 0 6px #00ffcc;
}
.sol-text { flex:1; color:#cceeff; font-size:13.5px; line-height:1.85; }
.sol-formula {
  display:block; margin:6px 0;
  background:rgba(0,255,200,0.07);
  border-left:3px solid #00ffcc;
  padding:6px 12px; border-radius:0 10px 10px 0;
  color:#88ffdd; font-weight:700; font-size:14px;
  text-shadow:0 0 6px #00ffcc88;
  font-family: 'Courier New', monospace;
}
.sol-ans {
  margin-top:12px; padding:10px 14px;
  background:rgba(0,255,136,0.12);
  border:1.5px solid #00ff88;
  border-radius:12px;
  color:#00ff88; font-weight:800; font-size:15px;
  text-align:center;
  text-shadow:0 0 10px #00ff88;
  box-shadow:0 0 12px #00ff8844;
}

/* ── 새 문제 버튼 ── */
.new-problem-btn {
  background:linear-gradient(135deg,rgba(255,0,150,0.3),rgba(100,0,255,0.3));
  border:2px solid #ff00cc;
  border-radius:16px; padding:16px;
  color:#ff88ff; font-size:15px; font-weight:700;
  cursor:pointer; width:100%; transition:all 0.2s;
  box-shadow:0 0 14px #ff00cc66, 0 0 28px #ff00cc33;
  display:flex; align-items:center; justify-content:center; gap:8px;
  text-shadow:0 0 8px #ff00cc;
  animation:btnPulse 2.5s ease-in-out infinite;
}
@keyframes btnPulse {
  0%,100%{ box-shadow:0 0 14px #ff00cc66,0 0 28px #ff00cc33; }
  50%    { box-shadow:0 0 28px #ff00ccaa,0 0 56px #ff00cc66; }
}
.new-problem-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 0 28px #ff00cccc, 0 0 56px #ff00cc88;
  color:#ffffff;
}

/* ── 키티 카드 ── */
.kitty-card {
  border-radius:20px; padding:18px;
  background:rgba(20,0,40,0.88);
  border:2px solid #ff44aa;
  box-shadow:0 0 14px #ff44aa66, 0 0 30px #ff44aa22;
  display:flex; align-items:center; gap:14px;
}
.kitty-wrapper { width:90px; height:90px; flex-shrink:0; }
.kitty-svg { width:90px; height:90px; }

@keyframes kittyFloat {
  0%  { transform:translateY(0) rotate(-1.5deg); }
  50% { transform:translateY(-8px) rotate(1.5deg); }
  100%{ transform:translateY(0) rotate(-1.5deg); }
}
@keyframes kittyHappy {
  0%  { transform:translateY(0) rotate(-5deg) scale(1); }
  50% { transform:translateY(-13px) rotate(5deg) scale(1.1); }
  100%{ transform:translateY(0) rotate(-5deg) scale(1); }
}
@keyframes kittySad {
  0%,100%{ transform:translateX(0); }
  15%    { transform:translateX(-8px) rotate(-4deg); }
  35%    { transform:translateX(8px) rotate(4deg); }
  55%    { transform:translateX(-6px) rotate(-3deg); }
  75%    { transform:translateX(6px) rotate(3deg); }
}
@keyframes kittyHeart {
  0%  { transform:scale(1) rotate(-2deg); }
  40% { transform:scale(1.15) rotate(3deg); }
  100%{ transform:scale(1) rotate(-2deg); }
}

.kitty-svg          { animation:kittyFloat 2.2s ease-in-out infinite; }
.kitty-svg.happy    { animation:kittyHappy 0.45s ease-in-out infinite; }
.kitty-svg.sad      { animation:kittySad 0.55s ease; }
.kitty-svg.heart    { animation:kittyHeart 0.55s ease-in-out infinite; }

.kitty-info { flex:1; }
.dessert-title { color:#ff88dd; font-size:12px; font-weight:600; margin-bottom:7px; text-shadow:0 0 6px #ff44aa; }
.dessert-row { display:flex; flex-wrap:wrap; gap:5px; min-height:36px; align-items:center; }
.dessert-badge {
  font-size:26px; cursor:pointer; display:inline-block;
  transition:transform 0.15s;
  filter:drop-shadow(0 0 6px #ff44aa) drop-shadow(0 0 12px #ff00cc);
}
.dessert-badge:hover { transform:scale(1.4) rotate(12deg); }
.dessert-badge.eating { animation:eatAnim 0.5s ease forwards; }
@keyframes eatAnim {
  0%  { transform:scale(1); }
  40% { transform:scale(1.8) rotate(25deg); }
  100%{ transform:scale(0) rotate(50deg); opacity:0; }
}
.no-dessert { color:#664466; font-size:12px; }
.kitty-msg { color:#ff88dd; font-size:12px; margin-top:7px; text-shadow:0 0 4px #ff44aa; }

/* ── 피드백 오버레이 ── */
.feedback-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  align-items:center; justify-content:center; pointer-events:none;
}
.feedback-overlay.show { display:flex; }
.feedback-emoji { font-size:120px; animation:fbPop 2s ease forwards; }
@keyframes fbPop {
  0%  { transform:scale(0) rotate(-25deg); opacity:0; }
  20% { transform:scale(1.5) rotate(6deg); opacity:1; }
  70% { transform:scale(1.1) rotate(0deg); opacity:1; }
  100%{ transform:scale(0.3) translateY(-100px); opacity:0; }
}

/* ── 파티클 ── */
.particle {
  position:fixed; pointer-events:none; z-index:300;
  animation:floatUp 1.9s ease forwards;
}
@keyframes floatUp {
  0%  { transform:translateY(0) scale(1) rotate(0deg); opacity:1; }
  100%{ transform:translateY(-280px) scale(0.05) rotate(80deg); opacity:0; }
}
.burst {
  position:fixed; pointer-events:none; z-index:250;
  animation:burstAnim 1s ease forwards;
}
@keyframes burstAnim {
  0%  { transform:scale(0) rotate(0deg); opacity:1; }
  55% { transform:scale(1.6) rotate(200deg); opacity:1; }
  100%{ transform:scale(0) rotate(360deg); opacity:0; }
}
</style>
</head>
<body>
<canvas id="sparkle-canvas"></canvas>

<div class="game-container">

  <!-- 시각화 카드 -->
  <div class="vis-card">
    <div class="vis-inner">
      <div class="charge-box">
        <div class="charge-src-circle" id="vis-src">+Q</div>
        <div class="charge-src-label">원천 전하</div>
      </div>
      <div class="mid-section">
        <div class="dist-label" id="vis-dist">1r</div>
        <div class="arrow-row">
          <div class="arrow-head-l">←</div>
          <div class="arrow-shaft"></div>
          <div class="arrow-head-r">→</div>
        </div>
        <div class="force-tag" id="vis-force">→ 1F</div>
      </div>
      <div class="charge-box">
        <div class="charge-tgt-circle" id="vis-tgt">+2q</div>
        <div class="charge-tgt-label">전하 A</div>
      </div>
    </div>
  </div>

  <!-- 질문 카드 -->
  <div class="question-card">
    <div class="question-title">🍎 물음</div>
    <div class="question-text" id="question-text">로딩 중...</div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- 풀이 카드 -->
  <div class="solution-card" id="solution-card">
    <div class="solution-title">🔬 풀이 과정</div>
    <div class="solution-body" id="solution-body"></div>
  </div>

  <!-- 새 문제 -->
  <button class="new-problem-btn" onclick="loadNewProblem()">🔀 새 문제</button>

  <!-- 키티 -->
  <div class="kitty-card">
    <div class="kitty-wrapper">
      <svg class="kitty-svg" id="kitty-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="64" rx="26" ry="22" fill="#fff0f8" stroke="#ffb3d9" stroke-width="2"/>
        <circle cx="50" cy="42" r="25" fill="#fff0f8" stroke="#ffb3d9" stroke-width="2"/>
        <polygon points="28,23 22,7 39,17" fill="#ffb3d9"/>
        <polygon points="72,23 78,7 61,17" fill="#ffb3d9"/>
        <polygon points="29,22 25,11 37,19" fill="#ff88c2"/>
        <polygon points="71,22 75,11 63,19" fill="#ff88c2"/>
        <g id="eyes-normal">
          <path d="M37 40 Q42 36 47 40" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M53 40 Q58 36 63 40" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </g>
        <g id="eyes-sad" display="none">
          <path d="M37 38 Q42 43 47 38" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M53 38 Q58 43 63 38" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </g>
        <g id="eyes-heart" display="none">
          <path d="M37 37 C37 34,40 33,42 35 C44 33,47 34,47 37 C47 40,42 44,42 44 C42 44,37 40,37 37Z" fill="#ff3399"/>
          <path d="M53 37 C53 34,56 33,58 35 C60 33,63 34,63 37 C63 40,58 44,58 44 C58 44,53 40,53 37Z" fill="#ff3399"/>
        </g>
        <g id="tears" display="none">
          <ellipse cx="36" cy="47" rx="2.2" ry="3.5" fill="#99ccff" opacity="0.9"/>
          <ellipse cx="64" cy="47" rx="2.2" ry="3.5" fill="#99ccff" opacity="0.9"/>
        </g>
        <ellipse cx="50" cy="47" rx="2.5" ry="1.5" fill="#ff88c2"/>
        <line x1="20" y1="46" x2="43" y2="48" stroke="#ddd" stroke-width="1.2"/>
        <line x1="20" y1="50" x2="43" y2="49" stroke="#ddd" stroke-width="1.2"/>
        <line x1="57" y1="48" x2="80" y2="46" stroke="#ddd" stroke-width="1.2"/>
        <line x1="57" y1="49" x2="80" y2="50" stroke="#ddd" stroke-width="1.2"/>
        <path id="mouth-happy" d="M44 52 Q50 58 56 52" stroke="#ff88c2" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <path id="mouth-sad" d="M44 56 Q50 51 56 56" stroke="#ff88c2" stroke-width="2.2" fill="none" stroke-linecap="round" display="none"/>
        <ellipse id="blush-l" cx="33" cy="51" rx="5" ry="3" fill="#ffaad4" opacity="0"/>
        <ellipse id="blush-r" cx="67" cy="51" rx="5" ry="3" fill="#ffaad4" opacity="0"/>
        <path d="M62 22 Q68 18 72 22 Q68 26 62 22Z" fill="#ff3399"/>
        <path d="M72 22 Q78 18 82 22 Q78 26 72 22Z" fill="#ff3399"/>
        <circle cx="72" cy="22" r="3" fill="#ff66b2"/>
      </svg>
    </div>
    <div class="kitty-info">
      <div class="dessert-title">🧁 모은 디저트 (클릭하면 먹여요!)</div>
      <div class="dessert-row" id="dessert-row"><span class="no-dessert">아직 없어요</span></div>
      <div class="kitty-msg" id="kitty-msg">문제를 맞추면 디저트를 받아요!</div>
    </div>
  </div>

</div>

<div class="feedback-overlay" id="feedback-overlay">
  <div class="feedback-emoji" id="feedback-emoji">🎉</div>
</div>

<script>
// ═══════════════════════════════════════
//  반짝이 캔버스 (매우 많이)
// ═══════════════════════════════════════
const canvas = document.getElementById('sparkle-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

const NEON_COLORS = [
  '#ff00cc','#ff44ff','#cc00ff','#ff0088',
  '#00ffff','#00ccff','#0088ff',
  '#ffff00','#ffcc00','#ff8800',
  '#00ff88','#44ff44',
  '#ffffff','#ffbbff','#bbffff'
];

const SPARKLE_COUNT = 350;
const sparkles = [];

function mkS() {
  return {
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*4 + 0.5,
    phase: Math.random()*Math.PI*2,
    speed: Math.random()*0.04 + 0.01,
    color: NEON_COLORS[Math.floor(Math.random()*NEON_COLORS.length)],
    type: Math.floor(Math.random()*4), // 0=4pt star, 1=circle, 2=cross, 3=diamond
    vy: -(Math.random()*0.4 + 0.05),
    vx: (Math.random()-0.5)*0.3,
    rot: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-0.5)*0.08,
  };
}
for (let i=0;i<SPARKLE_COUNT;i++) sparkles.push(mkS());

function draw4Star(x,y,r,rot){
  ctx.beginPath();
  for(let k=0;k<4;k++){
    const a = rot + k/4*Math.PI*2;
    ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    ctx.lineTo(x+Math.cos(a+Math.PI/4)*r*0.28, y+Math.sin(a+Math.PI/4)*r*0.28);
  }
  ctx.closePath(); ctx.fill();
}
function drawDiamond(x,y,r){
  ctx.beginPath();
  ctx.moveTo(x, y-r); ctx.lineTo(x+r*0.55, y);
  ctx.lineTo(x, y+r); ctx.lineTo(x-r*0.55, y);
  ctx.closePath(); ctx.fill();
}

function animSparkles() {
  ctx.clearRect(0,0,W,H);
  sparkles.forEach(s => {
    s.phase += s.speed;
    s.x += s.vx; s.y += s.vy; s.rot += s.rotSpeed;
    if (s.y < -20 || s.x < -20 || s.x > W+20) Object.assign(s, mkS(), {x: Math.random()*W, y: H+10});
    const alpha = (Math.sin(s.phase)+1)/2;
    ctx.save();
    ctx.globalAlpha = alpha * 0.9;
    ctx.fillStyle = s.color;
    ctx.strokeStyle = s.color;
    ctx.shadowBlur = 18;
    ctx.shadowColor = s.color;
    if (s.type===0) draw4Star(s.x,s.y,s.r,s.rot);
    else if (s.type===1){ ctx.beginPath(); ctx.arc(s.x,s.y,s.r*0.6,0,Math.PI*2); ctx.fill(); }
    else if (s.type===2){
      ctx.lineWidth=s.r*0.45;
      ctx.beginPath(); ctx.moveTo(s.x-s.r,s.y); ctx.lineTo(s.x+s.r,s.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s.x,s.y-s.r); ctx.lineTo(s.x,s.y+s.r); ctx.stroke();
    }
    else drawDiamond(s.x,s.y,s.r);
    ctx.restore();
  });
  requestAnimationFrame(animSparkles);
}
animSparkles();

let desserts=[], currentProblem=null, answered=false, usedIdx=[], kittyTimer=null;
const DESSERTS=['🍰','🧁','🍩','🍪','🍫','🍮','🍭','🍬','🎂','🍦','🧇','🍓'];

function getProblem(){
  let avail=PROBLEMS.filter((_,i)=>!usedIdx.includes(i));
  if(!avail.length){usedIdx=[];avail=PROBLEMS;}
  const idx=PROBLEMS.indexOf(avail[Math.floor(Math.random()*avail.length)]);
  usedIdx.push(idx); return PROBLEMS[idx];
}

function loadNewProblem(){
  answered=false;
  document.getElementById('solution-card').classList.remove('show');
  currentProblem=getProblem();
  const v=currentProblem.vis;

  document.getElementById('vis-src').textContent=v.src;

  // 거리
  const dEl=document.getElementById('vis-dist');
  dEl.textContent=v.dist;
  dEl.className=v.dist==='?'?'dist-label unknown-dist':'dist-label';

  // 전기력
  const fEl=document.getElementById('vis-force');
  fEl.textContent=v.force==='?'?'→ ?':v.force;
  fEl.className=v.force==='?'?'force-tag unknown-force':'force-tag';

  // 전하 A
  const tEl=document.getElementById('vis-tgt');
  tEl.textContent=v.tgt;
  tEl.className=v.tgt==='?'?'charge-tgt-circle unknown-tgt':'charge-tgt-circle';

  document.getElementById('question-text').innerHTML=currentProblem.q;

  const shuffled=[...currentProblem.choices].sort(()=>Math.random()-0.5);
  const el=document.getElementById('choices');
  el.innerHTML='';
  shuffled.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=c;
    btn.onclick=()=>checkAnswer(c,btn);
    el.appendChild(btn);
  });

  setKitty('normal');
  document.getElementById('kitty-msg').textContent='문제를 맞추면 디저트를 받아요!';
}

function checkAnswer(sel,btn){
  if(answered)return; answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===currentProblem.answer) b.classList.add('correct');
  });
  if(sel===currentProblem.answer){ btn.classList.add('correct'); onCorrect(); }
  else{ btn.classList.add('wrong'); onWrong(); }
  setTimeout(()=>showSolution(), 400);
}

function showSolution(){
  const card = document.getElementById('solution-card');
  const body = document.getElementById('solution-body');
  const steps = currentProblem.solution;
  let html = '';
  let stepNum = 1;
  steps.forEach(s => {
    if(s.ans){
      html += `<div class="sol-ans">✅ ${s.ans}</div>`;
    } else {
      html += `<div class="sol-step">
        <div class="sol-num">${stepNum++}</div>
        <div class="sol-text">${s.text}
          ${s.formula ? `<span class="sol-formula">${s.formula}</span>` : ''}
        </div>
      </div>`;
    }
  });
  body.innerHTML = html;
  // force reflow then animate in
  card.classList.remove('show');
  void card.offsetHeight;
  requestAnimationFrame(()=> card.classList.add('show'));
}

function onCorrect(){
  setKitty('happy');
  document.getElementById('kitty-msg').textContent='정답이에요! 🎉 디저트 획득!';
  const e=DESSERTS[Math.floor(Math.random()*DESSERTS.length)];
  desserts.push({emoji:e,eaten:false});
  renderDesserts();
  spawnParticles(['⭐','💕','✨','🎀','🌟','💫','🎊','🌈'],18);
  showFeedback('🎉');
  if(kittyTimer)clearTimeout(kittyTimer);
  kittyTimer=setTimeout(()=>setKitty('normal'),2000);
}

function onWrong(){
  setKitty('sad');
  document.getElementById('kitty-msg').textContent='아쉬워요... 다시 해봐요! 💪';
  showFeedback('😢');
  if(kittyTimer)clearTimeout(kittyTimer);
  kittyTimer=setTimeout(()=>setKitty('normal'),2000);
}

function setKitty(state){
  const svg=document.getElementById('kitty-svg');
  svg.className.baseVal='kitty-svg'+(state!=='normal'?' '+state:'');
  sd('eyes-normal', (state==='normal'||state==='happy')?'':'none');
  sd('eyes-sad',    state==='sad'?'':'none');
  sd('eyes-heart',  state==='heart'?'':'none');
  sd('tears',       state==='sad'?'':'none');
  sd('mouth-happy', state==='sad'?'none':'');
  sd('mouth-sad',   state==='sad'?'':'none');
  const b=(state==='happy'||state==='heart')?'0.7':'0';
  document.getElementById('blush-l').setAttribute('opacity',b);
  document.getElementById('blush-r').setAttribute('opacity',b);
}
function sd(id,v){document.getElementById(id).setAttribute('display',v);}

function renderDesserts(){
  const row=document.getElementById('dessert-row');
  row.innerHTML='';
  const uneaten=desserts.filter(d=>!d.eaten);
  if(!desserts.length){row.innerHTML='<span class="no-dessert">아직 없어요</span>';return;}
  if(!uneaten.length){row.innerHTML='<span class="no-dessert">다 먹었어요 😋</span>';return;}
  desserts.forEach((d,i)=>{
    if(d.eaten)return;
    const el=document.createElement('span');
    el.className='dessert-badge'; el.textContent=d.emoji; el.title='클릭해서 먹이기!';
    el.onclick=()=>eatDessert(i,el);
    row.appendChild(el);
  });
}

function eatDessert(i,el){
  if(desserts[i].eaten)return;
  desserts[i].eaten=true;
  el.classList.add('eating'); el.onclick=null;
  spawnParticles(['😋','💖','✨','🌸','💗','💝'],10);
  setKitty('heart');
  document.getElementById('kitty-msg').textContent='냠냠냠~ 너무 맛있어요! 💖';
  for(let k=0;k<10;k++) setTimeout(()=>{
    const s=document.createElement('div');
    s.className='burst'; s.style.fontSize=(24+Math.random()*14)+'px';
    s.textContent=['💖','✨','🌟','💗','⭐','🎀'][Math.floor(Math.random()*6)];
    s.style.left=(5+Math.random()*90)+'vw';
    s.style.top=(15+Math.random()*70)+'vh';
    document.body.appendChild(s); setTimeout(()=>s.remove(),1100);
  },k*80);
  setTimeout(()=>{
    renderDesserts();
    if(kittyTimer)clearTimeout(kittyTimer);
    kittyTimer=setTimeout(()=>setKitty('normal'),1500);
  },560);
}

function showFeedback(emoji){
  const ov=document.getElementById('feedback-overlay');
  document.getElementById('feedback-emoji').textContent=emoji;
  ov.classList.add('show');
  setTimeout(()=>ov.classList.remove('show'),2000);
}

function spawnParticles(emojis,count){
  for(let i=0;i<count;i++) setTimeout(()=>{
    const p=document.createElement('div');
    p.className='particle'; p.style.fontSize=(16+Math.random()*12)+'px';
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left=(5+Math.random()*90)+'vw';
    p.style.top=(15+Math.random()*70)+'vh';
    p.style.animationDuration=(1.3+Math.random()*0.9)+'s';
    document.body.appendChild(p); setTimeout(()=>p.remove(),2300);
  },i*60);
}

loadNewProblem();
