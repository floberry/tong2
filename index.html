<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물리학 시뮬레이션 갤러리</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #4bb7fa 0%, #0b888c 100%);
            min-height: 100vh;
            padding: 20px 10px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .gallery-container {
            max-width: 400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 0 10px;
        }

        .sim-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
        }

        .sim-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .sim-card:active {
            transform: translateY(-2px);
        }

        .card-image {
            flex: 1;
            background: linear-gradient(45deg, #809b9c, #324747);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #666;
            position: relative;
            overflow: hidden;
        }

        .card-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, 
                rgba(102, 126, 234, 0.1) 0%, 
                rgba(118, 75, 162, 0.1) 100%);
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0;
        }

        .card-title {
            padding: 8px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        .info-card {
            background: linear-gradient(135deg, #809b9c, #324747);
            color: white;
        }

        .info-card .card-image {
            background: transparent;
            font-size: 28px;
        }

        .info-card .card-title {
            background: rgba(255,255,255,0.2);
            color: white;
            border-top: 1px solid rgba(255,255,255,0.3);
        }

        /* 반응형 디자인 */
        @media (max-width: 380px) {
            .gallery-container {
                gap: 10px;
                padding: 0 5px;
            }
            
            .card-title {
                font-size: 10px;
                padding: 6px;
            }
        }

        @media (min-width: 480px) {
            .gallery-container {
                max-width: 450px;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 수행평가2 시뮬레이션 갤러리</h1>
        <p>학생들이 만든 Interactive Physics Simulations</p>
    </div>

    </div>

    <script>
        function openExternalLink(url) {
            window.open(url, '_blank');
        }

        function openSimulation(simId) {
            if (simId === 'info') {
                window.location.href = './info/index.html';
            } else {
                window.location.href = `./simulations/${simId}/index.html`;
            }
        }

        // 터치 피드백 개선
        document.querySelectorAll('.sim-card').forEach(card => {
            card.addEventListener('touchstart', function() {
                this.style.transform = 'translateY(-2px) scale(0.98)';
            });
            
            card.addEventListener('touchend', function() {
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
    </script>
</body>
</html>
