<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:12px;font-size:14px}
h2{text-align:center;color:#7eb8f7;font-size:1.05em;margin-bottom:10px}
.card{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:12px;margin-bottom:10px}
button{padding:6px 13px;border-radius:5px;border:none;cursor:pointer;font-size:.85em;font-weight:bold}

select{background:#0f3460;color:#e0e0e0;border:none;padding:4px 8px;border-radius:4px;font-size:.85em}

<body>

<div class="card">

    <text x="362" y="53" fill="#4dff9e" font-size="9">c</text>

    <!-- c→상단, d→하단 각 경로를 상단선(y=65)으로 합류 -->

    <line x1="390" y1="50" x2="390" y2="80" stroke="#445" stroke-width="2"/>

    <circle id="dp1" cx="80"  cy="65" r="5" fill="#4dff9e" opacity="0"/>
    <circle id="dp2" cx="190" cy="65" r="5" fill="#4dff9e" opacity="0"/>
    <circle id="dp3" cx="300" cy="65" r="5" fill="#4dff9e" opacity="0"/>
    <!-- 우 수직 아래 -->
    <circle id="dp4" cx="410" cy="107" r="5" fill="#4dff9e" opacity="0"/>
    <!-- 하단: 우→좌 -->
    <circle id="dp5" cx="340" cy="180" r="5" fill="#4dff9e" opacity="0"/>
    <circle id="dp6" cx="230" cy="180" r="5" fill="#4dff9e" opacity="0"/>

  <div id="statusBar" style="text-align:center;font-size:.78em;color:#aaa;margin-top:6px"></div>

<div class="card">
  <div class="row">
    <span style="font-size:.9em;font-weight:bold;color:#7eb8f7">📋 실험 결과표</span>
    <button id="genBtn">🎲 새 문제 생성</button>
  </div>
  <table>
    <tr><th>과정</th><th>전구</th><th>검류계 전류 방향</th></tr>
    <tr><td>(가)</td><td id="tGaB"></td><td id="tGaG"></td></tr>
    <tr><td>(나)</td><td id="tNaB"></td><td id="tNaG"></td></tr>
  </table>

  <div style="font-size:.8em;font-weight:bold;color:#ccc;margin-bottom:6px;border-top:1px solid #0f3460;padding-top:8px">─ &lt;보기&gt; ─</div>
  <div id="bogi" style="font-size:.83em;line-height:2;margin-bottom:10px;background:#0d1a30;padding:8px;border-radius:5px"></div>

  <div style="font-size:.8em;color:#aaa;margin-bottom:4px">옳은 것만을 &lt;보기&gt;에서 있는 대로 고르면?</div>
  <div id="choices"></div>
  <div style="text-align:center;margin-top:10px"><button id="checkBtn">✅ 정답 확인</button></div>
  <div id="feedback"></div>
</div>

<script>
/*
 * ── 회로 물리 모델 (수능 기출 구조) ──────────────────────────────
 *
 * 직렬 회로: 전지 — X — A — 스위치S — 전구 — 검류계G — (전지로 귀환)
 *
 * 다이오드 방향 표기:
 *   삼각형 꼭짓점이 가리키는 방향 = 전류 허용 방향 (p→n 순서)
 *   A는 항상 → 방향 고정 (p: 좌측, n: 우측)
 *
 * X의 방향(xDir): 'right'(→, p좌-n우) 또는 'left'(←, n좌-p우)
 *
 * 전지 극성(batDir): 'normal'(+극이 상단=a단자 측) 또는 'flip'(+극이 하단)
 *
 * (가) 스위치 c: batDir 그대로 사용
 * (나) 스위치 d: 전지 극성 반전 효과 (우회 경로로 극성 바뀜)
 *
 * 순방향 조건 (두 다이오드 모두 동시에 순방향이어야 전류 흐름):
 *   A는 → 고정이므로 A 순방향 = 전류가 왼→오 = a(상단)가 + 극
 *   X→ 방향이면: X 순방향도 a(상단)가 + 극
 *   X← 방향이면: X 순방향은 a(상단)가 - 극 = b(상단)가 + 극
 *
 *   따라서:
 *     xDir='right': 두 다이오드 모두 → → a가 +극이어야 순방향
 *     xDir='left' : X←, A→ → 전류 방향이 반대 → 항상 하나가 역방향
 *                   → 어느 극성도 전류 못 흐름 (이 경우는 생성하지 않음)
 *
 * ∴ 유효한 문제 = X와 A가 같은 방향일 때만 전류 흐름 가능
 *   수능 패턴: X가 → 이면 (가)/(나) 중 하나만 순방향 (배터리 극성으로 제어)
 *              X가 ← 이면 (가)/(나) 중 하나만 순방향 (A는 → 고정이므로 X 단독으로 통제)
 *
 * 실제 구현:
 *   xDir = 'right' | 'left'  (X 다이오드 삼각형 방향)
 *   gaTopPlus = true|false    ((가)에서 a단자(상단)가 +극인가)
 *
 *   A 순방향 조건: gaTopPlus = true  (A는 →, p쪽=좌=a가 +극)
 *   X 순방향 조건:
 *     xDir='right': gaTopPlus = true
 *     xDir='left' : gaTopPlus = false (X의 p쪽=우=b가 +극)
 *
 *   gaFwd = (A_fwd) AND (X_fwd)
 *   naFwd = !gaFwd  (스위치d = 극성 반전)
 *
 *   보장: 반드시 (가)와 (나) 중 정확히 하나만 전류 흐름
 *         (양쪽 모두 흐르거나 모두 안 흐르는 경우 재생성)
 */

let P = {};
let dotTimer = null;
const dpIds = ['dp1','dp2','dp3','dp4','dp5','dp6','dp7'];
const dpts = dpIds.map(id => document.getElementById(id));

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generateProblem(){
  // 무작위 파라미터
  const xDir = rnd(['right','left']);       // X 다이오드 방향
  const gaTopPlus = Math.random() < 0.5;   // (가)에서 a단자가 +극?

  // 각 다이오드의 순방향 여부 계산
  const A_ga_fwd = gaTopPlus;              // A(→): p쪽(좌=a)에 +극 → 순방향
  const X_ga_fwd = xDir==='right'
    ? gaTopPlus                            // X(→): 같은 조건
    : !gaTopPlus;                          // X(←): p쪽(우=b)에 +극 → 조건 반대

  const gaFwd = A_ga_fwd && X_ga_fwd;     // 직렬: 둘 다 순방향이어야 전류 흐름
  const naFwd = !gaFwd;                    // (나)는 극성 반전 → 정확히 반대

  // gaFwd XOR naFwd 보장 확인 (항상 성립하지만 명시)
  // gaFwd !== naFwd 항상 true

  // ── 보기 진위 (물리 역산) ──
  // ㄱ: "X는 p형 반도체이다"
  //   → X의 왼쪽(a쪽)이 p형인가? xDir='right'이면 왼쪽=p → true
  const g1_Xis_p = xDir === 'right';  // X 왼쪽(삼각형 꼭짓점 쪽) = p형
  // 보기 문장은 50% 확률로 참/거짓 서술 선택
  const g1_says_p = Math.random() < 0.5;
  const g1_true = (g1_says_p === g1_Xis_p);

  // ㄴ: "(가)에서 b→G→a 방향이 ①에 해당한다"
  //   (가) 순방향이면 전류: a→X→A→b→전구→G→a
  //   G 통과: b→a 방향 = ① → gaFwd=true 이면 참
  //   (가) 역방향이면 전류 없음 → ①에 해당 안 함 → false
  const g2_true = gaFwd;
  // ㄴ 서술은 항상 "①에 해당한다"로 고정 (진위만 달라짐)

  // ㄷ: "(나)에서 A의 양공과 전자는 p-n 접합면 [방향]으로 이동한다"
  //   naFwd=true → 순방향 → 접합면 쪽으로 이동 → 참
  //   naFwd=false → 역방향 → 접합면 반대쪽으로 이동
  // 서술을 50% 확률로 "쪽으로" / "반대쪽으로" 선택
  const g3_says_toward = Math.random() < 0.5;
  const g3_true = (g3_says_toward === naFwd);

  // ── 정답 세트 ──
  const truthMap = [g1_true, g2_true, g3_true];
  const allLabels = ['ㄱ','ㄴ','ㄷ'];
  const correctLabels = allLabels.filter((_,i) => truthMap[i]);
  const correctKey = correctLabels.join(',') || '없음';

  // ── 선택지 생성 (중복 없이) ──
  const pool = [
    ['ㄱ'],['ㄴ'],['ㄷ'],
    ['ㄱ','ㄴ'],['ㄱ','ㄷ'],['ㄴ','ㄷ'],['ㄱ','ㄴ','ㄷ']
  ];
  const wrongs = pool.filter(c => c.join(',') !== correctKey)
                     .sort(() => Math.random()-.5).slice(0,4);
  const opts = [...wrongs, correctLabels.length ? correctLabels : ['없음']]
                     .sort(() => Math.random()-.5);
  const correctIdx = opts.findIndex(o => o.join(',') === correctKey);

  P = {
    xDir, gaTopPlus, gaFwd, naFwd,
    g1_Xis_p, g1_says_p, g1_true,
    g2_true,
    g3_says_toward, g3_true,
    truthMap, correctKey, opts, correctIdx
  };

  renderProblem();
}

function drawDiodeX(){
  const g = document.getElementById('dxGroup');
  g.innerHTML = '';
  // X 다이오드 영역: x=100~175, y중심=65
  // right(→): 삼각형 꼭짓점이 오른쪽 (전류 →), p=좌, n=우
  // left(←) : 삼각형 꼭짓점이 왼쪽  (전류 ←), n=좌, p=우
  const svg = (tag,attrs,txt='') => {
    const el = document.createElementNS('http://www.w3.org/2000/svg',tag);
    Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
    if(txt) el.textContent=txt;
    g.appendChild(el); return el;
  };
  // p형 색: 선명한 빨강(#ff4d6d), n형 색: 선명한 하늘(#5bc8ff) — 어두운 배경 대비 극대화
  const pColor = '#ff4d6d', nColor = '#5bc8ff';
  if(P.xDir==='right'){
    // → 방향: p=좌(100), n=우(140 bar쪽)
    svg('polygon',{points:'100,50 140,65 100,80',fill:'#e94560',stroke:'#e94560','stroke-width':'1'});
    svg('line',{x1:'140',y1:'50',x2:'140',y2:'80',stroke:'#e94560','stroke-width':'3'});
    svg('line',{x1:'140',y1:'65',x2:'175',y2:'65',stroke:'#445','stroke-width':'2'});
    // 라벨: p는 삼각형 꼭짓점(좌) 쪽, n은 bar(우) 바깥쪽
    document.getElementById('xLbg').setAttribute('x','97');
    document.getElementById('xRbg').setAttribute('x','155');
    document.getElementById('xL').setAttribute('x','105'); document.getElementById('xL').textContent='p'; document.getElementById('xL').setAttribute('fill',pColor);
    document.getElementById('xR').setAttribute('x','163'); document.getElementById('xR').textContent='n'; document.getElementById('xR').setAttribute('fill',nColor);
  } else {
    // ← 방향: n=좌(100), p=우(135 bar 바깥쪽)
    svg('polygon',{points:'175,50 135,65 175,80',fill:'#e94560',stroke:'#e94560','stroke-width':'1'});
    svg('line',{x1:'135',y1:'50',x2:'135',y2:'80',stroke:'#e94560','stroke-width':'3'});
    svg('line',{x1:'100',y1:'65',x2:'135',y2:'65',stroke:'#445','stroke-width':'2'});
    document.getElementById('xLbg').setAttribute('x','97');
    document.getElementById('xRbg').setAttribute('x','155');
    document.getElementById('xL').setAttribute('x','105'); document.getElementById('xL').textContent='n'; document.getElementById('xL').setAttribute('fill',nColor);
    document.getElementById('xR').setAttribute('x','163'); document.getElementById('xR').textContent='p'; document.getElementById('xR').setAttribute('fill',pColor);
  }
}

function updateCircuit(){
  const pos = document.getElementById('swSel').value; // 'ga'|'na'
  const isGa = pos === 'ga';
  const fwd = isGa ? P.gaFwd : P.naFwd;
  const topPlus = isGa ? P.gaTopPlus : !P.gaTopPlus;

  // 전지 극성
  document.getElementById('batTop').textContent = topPlus ? '+' : '−';
  document.getElementById('batTop').setAttribute('fill', topPlus ? '#e94560' : '#7eb8f7');
  document.getElementById('batBot').textContent = topPlus ? '−' : '+';
  document.getElementById('batBot').setAttribute('fill', topPlus ? '#7eb8f7' : '#e94560');

  // 스위치 팔
  const arm = document.getElementById('swArm');
  arm.setAttribute('x2','355'); arm.setAttribute('y2', isGa ? '50' : '80');
  arm.setAttribute('stroke', isGa ? '#4dff9e' : '#ff6b6b');

  // 상태 라벨
  const sl = document.getElementById('stateLabel');
  sl.textContent = fwd
    ? `${isGa?'(가)':'(나)'} 순방향 ✅ — 두 다이오드 모두 순방향 → 전류 흐름`
    : `${isGa?'(가)':'(나)'} 역방향 ⛔ — 하나 이상 역방향 → 전류 차단`;
  sl.style.color = fwd ? '#4dff9e' : '#ff6b6b';

  // 전구 — 순방향: 후광+밝은 노랑 / 역방향: 소등+반투명
  document.getElementById('bulb').style.fill         = fwd ? '#fff5aa' : '#1e1e3a';
  document.getElementById('bulb').style.stroke       = fwd ? '#ffd700' : '#666';
  document.getElementById('bulbGlow').style.opacity  = fwd ? '0.22'    : '0';
  document.getElementById('bulbEmoji').style.opacity = fwd ? '1'       : '0.3';

  // 검류계 바늘 (pivot = 원 중심 230,180 → 순방향=① = 왼쪽 회전)
  document.getElementById('needle').style.transform = fwd ? 'rotate(-35deg)' : 'rotate(0deg)';

  // 상태바
  document.getElementById('statusBar').innerHTML =
    `X 방향: <b style="color:#e94560">${P.xDir==='right'?'→(p좌-n우)':'←(n좌-p우)'}</b> &nbsp;|&nbsp; ` +
    `현재: <b style="color:${fwd?'#4dff9e':'#ff6b6b'}">${fwd?'순방향':'역방향'}</b> &nbsp;|&nbsp; ` +
    `전구: ${fwd?'<b style="color:#ffe066">켜짐</b>':'꺼짐'} &nbsp;|&nbsp; ` +
    `검류계: ${fwd?'<b>① 방향</b>':'없음'}`;

  // 점 애니메이션
  clearInterval(dotTimer);
  dpts.forEach(d => d.setAttribute('opacity','0'));
  if(fwd){
    let t=0;
    dotTimer = setInterval(()=>{
      dpts.forEach((d,i)=>d.setAttribute('opacity', i===t%dpts.length ? '1':'0'));
      t++;
    }, 180);
  }
}

function renderProblem(){
  drawDiodeX();

  // 결과표
  const yn = (v,col) => v
    ? `<span style="color:#ffe066;font-weight:bold">켜짐</span>`
    : `<span style="color:#888">꺼짐</span>`;
  document.getElementById('tGaB').innerHTML = yn(P.gaFwd);
  document.getElementById('tGaG').textContent = P.gaFwd ? '①' : '해당 없음';
  document.getElementById('tNaB').innerHTML = yn(P.naFwd);
  document.getElementById('tNaG').textContent = P.naFwd ? '①' : '해당 없음';

  // 보기 문장
  const g1text = `ㄱ. X는 <b>${P.g1_says_p?'p형':'n형'}</b> 반도체이다.`;
  const g2text = `ㄴ. (가)에서 b → ⓔ(G) → a 방향의 전류가 <b>①</b>에 해당한다.`;
  const g3text = `ㄷ. (나)에서 A의 양공과 전자는 p-n 접합면 <b>${P.g3_says_toward?'쪽으로':'반대쪽으로'}</b> 이동한다.`;
  document.getElementById('bogi').innerHTML = [g1text,g2text,g3text].join('<br>');

  // 선택지
  const nums=['①','②','③','④','⑤'];
  document.getElementById('choices').innerHTML = P.opts.map((o,i)=>
    `<label><input type="radio" name="ans" value="${i}"> ${nums[i]} ${o.join(', ')}</label>`
  ).join('');

  document.getElementById('feedback').style.display='none';
  document.getElementById('swSel').value='ga';
  updateCircuit();
}

document.getElementById('swSel').addEventListener('change', updateCircuit);

document.getElementById('checkBtn').addEventListener('click',()=>{
  const sel = document.querySelector('input[name="ans"]:checked');
  const fb = document.getElementById('feedback');
  if(!sel){ fb.style.display='block'; fb.className='wrong'; fb.innerHTML='보기를 선택하세요.'; return; }
  const ok = parseInt(sel.value) === P.correctIdx;

  // 상세 해설 — 각 보기를 .fbline 블록으로 분리해 가독성 확보
  const tag = (label, ok) =>
    `<span class="tag ${ok?'tag-ok':'tag-ng'}">${label} ${ok?'✅':'❌'}</span>`;

  const xPside  = P.xDir==='right' ? '왼쪽(a쪽)' : '오른쪽(b쪽)';
  const xActual = P.g1_Xis_p ? 'p형' : 'n형';
  const e1 = P.g1_true
    ? `${tag('ㄱ',true)} X의 ${xPside}이 p형 → X는 ${xActual}. 보기(${P.g1_says_p?'p형':'n형'})와 <b>일치</b>.`
    : `${tag('ㄱ',false)} X는 실제로 ${xActual}이지만 보기는 ${P.g1_says_p?'p형':'n형'}으로 서술 → <b>불일치</b>.`;

  const e2 = P.g2_true
    ? `${tag('ㄴ',true)} (가) 순방향 → 전류: a→X→A→b→전구→G→a. G 통과 방향 b→a = <b>①</b>.`
    : `${tag('ㄴ',false)} (가) 역방향 → 전류 차단 → G 전류 없음 → ① <b>해당 안 됨</b>.`;

  const naState     = P.naFwd ? '순방향' : '역방향';
  const carrierReal = P.naFwd ? '접합면 <b>쪽으로</b> 이동 (재결합→전류)' : '접합면 <b>반대쪽으로</b> 이동 (공핍층 확대→차단)';
  const e3 = P.g3_true
    ? `${tag('ㄷ',true)} (나) ${naState} → A 캐리어: ${carrierReal}. 보기 서술과 <b>일치</b>.`
    : `${tag('ㄷ',false)} (나) ${naState} → A 캐리어: ${carrierReal}. 보기(${P.g3_says_toward?'접합면 쪽':'반대쪽'})와 <b>불일치</b>.`;

  fb.style.display='block';
  fb.className = ok ? 'correct' : 'wrong';
  fb.innerHTML =
    `<b style="font-size:.9em">${ok ? '✅ 정답!' : '❌ 오답 — 정답: ' + (P.correctKey||'없음')}</b>` +
    `<span class="fbline">${e1}</span>` +
    `<span class="fbline">${e2}</span>` +
    `<span class="fbline">${e3}</span>`;
});

document.getElementById('genBtn').addEventListener('click', generateProblem);
generateProblem();
</script>
