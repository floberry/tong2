<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전기 멀티탭 — 물리 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04091a;
  --s1:#080f28;
  --s2:#0c1535;
  --s3:#111d3a;
  --cyan:#00e5ff;
  --cyan2:#0097a7;
  --amber:#ffc107;
  --green:#00e676;
  --red:#ff1744;
  --txt:#e8f4fc;
  --muted:#4a6d8c;
  --border:rgba(0,229,255,0.13);
  --border2:rgba(0,229,255,0.28);
}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
  padding:0 0 60px;
}

/* scanline overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
}

.wrap{max-width:820px;margin:0 auto;padding:0 18px;}

/* ── HEADER ── */
.hdr{
  padding:22px 0 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:28px;
}
.hdr-left{}
.hdr-kicker{
  font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:3px;color:var(--muted);
  text-transform:uppercase;margin-bottom:4px;
}
.hdr-title{
  font-family:'Orbitron',sans-serif;
  font-size:26px;font-weight:900;
  color:var(--cyan);
  letter-spacing:2px;
  text-shadow:0 0 32px rgba(0,229,255,0.45);
}
.hdr-title span{color:var(--txt);font-weight:400;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.streak-bar{display:flex;gap:5px;}
.sd{
  width:28px;height:5px;border-radius:2px;
  background:var(--s3);border:1px solid var(--border);
  transition:background 0.4s,box-shadow 0.4s;
}
.sd.on{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.streak-label{
  font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;
}

/* ── PROBLEM ── */
.problem-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:14px;
  padding:22px 24px 20px;
  margin-bottom:16px;
  position:relative;overflow:hidden;
}
.problem-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
}
.prob-eyebrow{
  font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:3px;color:var(--cyan);
  text-transform:uppercase;margin-bottom:10px;opacity:.7;
}
.prob-text{font-size:14px;line-height:1.85;color:var(--txt);}
.prob-text b{color:var(--cyan);}
.prob-q{
  margin-top:14px;padding:11px 16px;
  background:var(--s2);
  border-left:3px solid var(--cyan);
  border-radius:0 8px 8px 0;
  font-size:15px;font-weight:700;color:var(--txt);
  line-height:1.6;
}

/* ── MAIN GRID (circuit + table) ── */
.main-grid{
  display:grid;
  grid-template-columns:1fr 190px;
  gap:14px;
  margin-bottom:14px;
}
.circuit-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  position:relative;overflow:hidden;
}
.circuit-label{
  font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;margin-bottom:8px;
}
#circ{width:100%;display:block;}

.table-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}
.table-card-hdr{
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;
}
.ptbl{width:100%;border-collapse:collapse;}
.ptbl th{
  padding:8px 14px;
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:1px;color:var(--muted);
  text-transform:uppercase;
  border-bottom:1px solid var(--border);
  text-align:center;
}
.ptbl td{
  padding:10px 14px;text-align:center;
  border-bottom:1px solid var(--border);
}
.ptbl tr:last-child td{border-bottom:none;}
.ptbl td:first-child{
  font-family:'Orbitron',sans-serif;
  font-size:16px;font-weight:700;
}
.ptbl td:last-child{
  font-family:'Space Mono',monospace;
  font-size:12px;color:var(--txt);
}
.ca{color:#ff7043;}.cb{color:#42a5f5;}.cc{color:#66bb6a;}

/* ── FIELD BAR ── */
.field-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 18px;
  margin-bottom:14px;
  position:relative;overflow:hidden;
}
.field-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--cyan2),transparent);
}
.field-row{
  display:flex;justify-content:space-between;
  font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:1px;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px;
}
#field-svg{width:100%;display:block;}
.field-caption{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:2px;color:rgba(0,229,255,0.35);
  text-align:center;margin-top:8px;
}

/* ── CHOICES ── */
.choices-wrap{margin-bottom:14px;}
.choices-hdr{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:2px;color:var(--muted);text-transform:uppercase;
  margin-bottom:10px;text-align:center;
}
.choices{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.choice{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:16px 6px;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:12px;
  cursor:pointer;
  transition:border-color .15s,background .15s,transform .12s,box-shadow .15s;
  font-family:inherit;
  color:var(--txt);
}
.choice:hover:not(:disabled){
  border-color:var(--cyan2);
  background:var(--s2);
  transform:translateY(-3px);
  box-shadow:0 6px 24px rgba(0,229,255,0.12);
}
.choice:disabled{cursor:default;transform:none;}
.c-idx{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.c-num{
  font-family:'Orbitron',sans-serif;
  font-size:24px;font-weight:700;line-height:1;
  color:var(--txt);
  transition:color .15s;
}
.c-unit{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}

.choice.correct{
  border-color:var(--green)!important;
  background:rgba(0,230,118,0.07)!important;
  box-shadow:0 0 20px rgba(0,230,118,0.22)!important;
}
.choice.correct .c-num,.choice.correct .c-idx,.choice.correct .c-unit{color:var(--green);}
.choice.wrong{
  border-color:var(--red)!important;
  background:rgba(255,23,68,0.07)!important;
  box-shadow:0 0 16px rgba(255,23,68,0.18)!important;
}
.choice.wrong .c-num,.choice.wrong .c-idx,.choice.wrong .c-unit{color:var(--red);}

/* ── FEEDBACK ── */
.fb{display:none;margin-bottom:14px;}
.fb.show{display:block;}
.fb-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
}
.fb-banner{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;
}
.fb-banner.ok{
  background:rgba(0,230,118,0.1);
  border-bottom:1px solid rgba(0,230,118,0.25);
}
.fb-banner.ng{
  background:rgba(255,23,68,0.08);
  border-bottom:1px solid rgba(255,23,68,0.2);
}
.fb-icon-wrap{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.ok .fb-icon-wrap{background:rgba(0,230,118,0.15);border:1px solid rgba(0,230,118,0.3);}
.ng .fb-icon-wrap{background:rgba(255,23,68,0.12);border:1px solid rgba(255,23,68,0.25);}
.fb-title{font-size:15px;font-weight:700;}
.ok .fb-title{color:var(--green);}
.ng .fb-title{color:var(--red);}
.fb-sub{font-size:12px;color:var(--muted);margin-top:2px;}

.fb-body{padding:18px 20px;}
.sol-hdr{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:2px;color:var(--cyan);
  text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.sol-hdr::after{content:'';flex:1;height:1px;background:var(--border);}

.sol-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.sol-card{
  background:var(--s2);border:1px solid var(--border);
  border-radius:10px;padding:12px;
}
.sol-card-lbl{
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;
}
.sol-card-eq{font-size:12px;line-height:1.8;color:var(--muted);}
.sol-card-eq b{font-family:'Space Mono',monospace;}
.sol-card-eq .hi{font-size:15px;font-weight:700;}

.ans-row{
  display:flex;align-items:center;gap:16px;
  padding:14px 16px;
  background:var(--s2);border:1px solid var(--border2);
  border-radius:10px;
}
.ans-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.ans-val{
  font-family:'Orbitron',sans-serif;
  font-size:40px;font-weight:900;color:var(--cyan);
  text-shadow:0 0 24px rgba(0,229,255,0.5);
  line-height:1;
}
.ans-unit{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);align-self:flex-end;padding-bottom:6px;}
.ans-formula{
  font-family:'Space Mono',monospace;font-size:10px;
  color:var(--muted);margin-left:auto;line-height:1.8;text-align:right;
}

/* ── NEW BTN ── */
.new-btn{
  width:100%;padding:15px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--muted);
  font-family:'Space Mono',monospace;font-size:11px;
  letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:border-color .2s,color .2s,box-shadow .2s,background .2s;
}
.new-btn:hover{
  border-color:var(--cyan);color:var(--cyan);
  background:rgba(0,229,255,0.05);
  box-shadow:0 0 24px rgba(0,229,255,0.1);
}

/* ── CURRENT FLOW ANIM ── */
@keyframes flow{to{stroke-dashoffset:0}}
.wire-flow{
  stroke-dasharray:12 18;
  stroke-dashoffset:30;
  animation:flow 1.2s linear infinite;
  stroke:var(--cyan);stroke-width:2;fill:none;opacity:.55;
}

/* responsive */
@media(max-width:600px){
  .main-grid{grid-template-columns:1fr;}
  .choices{grid-template-columns:repeat(3,1fr);}
  .sol-cards{grid-template-columns:repeat(2,1fr);}
  .hdr-title{font-size:18px;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-kicker">2022 개정 교육과정 · 고등 물리학</div>
      <div class="hdr-title">CIRCUIT<span> LAB</span></div>
    </div>
    <div class="hdr-right">
      <div class="streak-bar">
        <div class="sd" id="d0"></div><div class="sd" id="d1"></div>
        <div class="sd" id="d2"></div><div class="sd" id="d3"></div>
        <div class="sd" id="d4"></div>
      </div>
      <div class="streak-label" id="streak-lbl">연속 정답</div>
    </div>
  </div>

  <!-- PROBLEM -->
  <div class="problem-card">
    <div class="prob-eyebrow">Problem 10 — 병렬 회로 · 소비 전력</div>
    <div class="prob-text" id="prob-text"></div>
  </div>

  <!-- CIRCUIT + TABLE -->
  <div class="main-grid">
    <div class="circuit-card">
      <div class="circuit-label">Circuit Diagram</div>
      <svg id="circ" viewBox="0 0 420 160" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="table-card">
      <div class="table-card-hdr">소비 전력</div>
      <table class="ptbl">
        <thead><tr><th>기구</th><th>전력</th></tr></thead>
        <tbody id="ptbl"></tbody>
      </table>
    </div>
  </div>

  <!-- FIELD -->
  <div class="field-card">
    <div class="field-row">
      <span>(+) 고전위</span>
      <span>전기장 방향 E ←</span>
      <span>저전위 (−)</span>
    </div>
    <svg id="field-svg" viewBox="0 0 700 44" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="field-caption">← ← ← E 전기장 방향 (오른쪽 → 왼쪽) ← ← ←</div>
  </div>

  <!-- CHOICES -->
  <div class="choices-wrap">
    <div class="choices-hdr">선지를 클릭하면 즉시 채점</div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- FEEDBACK -->
  <div class="fb" id="fb">
    <div class="fb-card">
      <div class="fb-banner" id="fb-banner">
        <div class="fb-icon-wrap" id="fb-icon"></div>
        <div>
          <div class="fb-title" id="fb-title"></div>
          <div class="fb-sub" id="fb-sub"></div>
        </div>
      </div>
      <div class="fb-body">
        <div class="sol-hdr">풀이 과정</div>
        <div class="sol-cards" id="sol-cards"></div>
        <div class="ans-row">
          <div>
            <div class="ans-lbl">정답 전류</div>
            <div class="ans-val" id="ans-val"></div>
          </div>
          <div class="ans-unit">A</div>
          <div class="ans-formula" id="ans-formula"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- NEW BTN -->
  <button class="new-btn" onclick="newProblem()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    새 문제 생성
  </button>

</div><!-- /wrap -->

<script>
const V=220;
const POOL=[1,2,3,4,5,6];
let prob=null,answered=false,streak=0;

function rnd(a){return a[Math.floor(Math.random()*a.length)];}

function gen(){
  let iA,iB,iC;
  do{iA=rnd(POOL);iB=rnd(POOL);iC=rnd(POOL);}
  while(iA===iB&&iB===iC);
  return{iA,iB,iC,PA:iA*V,PB:iB*V,PC:iC*V,total:iA+iB+iC};
}

function newProblem(){
  prob=gen();answered=false;
  document.getElementById('fb').classList.remove('show');
  renderText();renderTable();renderCircuit();renderField();renderChoices();
}

function renderText(){
  document.getElementById('prob-text').innerHTML=
    `그림은 정격 전압이 <b>${V} V</b>인 전기 기구 <b>A, B, C</b>와 `+
    `<b>${V} V</b>의 전원에 연결된 멀티탭을, `+
    `표는 각 전기 기구의 소비 전력을 나타낸 것이다.`+
    `<div class="prob-q">A, B, C를 멀티탭에 <b>동시에</b> 연결할 때,<br>멀티탭에 흐르는 <b>전류의 세기</b>는?</div>`;
}

function renderTable(){
  const cls=['ca','cb','cc'];
  document.getElementById('ptbl').innerHTML=
    ['A','B','C'].map((l,i)=>{
      const p=[prob.PA,prob.PB,prob.PC][i];
      return`<tr><td class="${cls[i]}">${l}</td><td>${p} W</td></tr>`;
    }).join('');
}

function renderCircuit(){
  const svg=document.getElementById('circ');
  const W=420,H=160;
  const tY=22,bY=140;
  const srcX=52;
  const tapL=128,tapR=395,tapY=112,tapH=22;
  const apps=[
    {x:180,l:'A',c:'#ff7043',ci:prob.iA},
    {x:275,l:'B',c:'#42a5f5',ci:prob.iB},
    {x:370,l:'C',c:'#66bb6a',ci:prob.iC}
  ];

  let o=`<defs>
    <marker id="ah" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <polygon points="0,0 5,2.5 0,5" fill="rgba(0,229,255,0.6)"/>
    </marker>
    <filter id="cg"><feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  /* 전원 */
  o+=`<rect x="${srcX-18}" y="44" width="36" height="70" rx="4"
    fill="#080f28" stroke="rgba(0,229,255,0.25)" stroke-width="1.5"/>`;
  o+=`<text x="${srcX}" y="62" text-anchor="middle" font-family="Space Mono,monospace"
    font-size="8" fill="#4a6d8c" letter-spacing="1">전원</text>`;
  o+=`<text x="${srcX}" y="79" text-anchor="middle" font-family="Orbitron,sans-serif"
    font-size="14" font-weight="700" fill="#ffc107" filter="url(#cg)">${V}V</text>`;
  o+=`<line x1="${srcX-9}" y1="87" x2="${srcX+9}" y2="87" stroke="#e8f4fc" stroke-width="2"/>`;
  o+=`<line x1="${srcX-5}" y1="93" x2="${srcX+5}" y2="93" stroke="#e8f4fc" stroke-width="1.2"/>`;

  /* 주 배선 — 실선 */
  const wireStyle=`stroke="rgba(0,229,255,0.22)" stroke-width="1.8"`;
  o+=`<line x1="${srcX}" y1="44" x2="${srcX}" y2="${tY}" ${wireStyle}/>`;
  o+=`<line x1="${srcX}" y1="${tY}" x2="${W-12}" y2="${tY}" ${wireStyle}/>`;
  o+=`<line x1="${W-12}" y1="${tY}" x2="${W-12}" y2="${bY}" ${wireStyle}/>`;
  o+=`<line x1="${srcX}" y1="114" x2="${srcX}" y2="${bY}" ${wireStyle}/>`;
  o+=`<line x1="${srcX}" y1="${bY}" x2="${W-12}" y2="${bY}" ${wireStyle}/>`;

  /* 전류 흐름 애니메이션 — 상단 */
  o+=`<line x1="${srcX+2}" y1="${tY}" x2="${W-12}" y2="${tY}" class="wire-flow"/>`;
  o+=`<line x1="${W-12}" y1="${tY}" x2="${W-12}" y2="${bY}" class="wire-flow" style="animation-delay:.4s"/>`;
  o+=`<line x1="${W-12}" y1="${bY}" x2="${srcX}" y2="${bY}" class="wire-flow" style="animation-delay:.9s;animation-direction:reverse"/>`;

  /* 전류 방향 화살표 */
  o+=`<line x1="${srcX+28}" y1="${tY}" x2="${srcX+50}" y2="${tY}"
    stroke="rgba(0,229,255,0.6)" stroke-width="1.5" marker-end="url(#ah)"/>`;

  /* 멀티탭 */
  o+=`<rect x="${tapL}" y="${tapY}" width="${tapR-tapL}" height="${tapH}" rx="4"
    fill="#0c1535" stroke="rgba(0,229,255,0.2)" stroke-width="1.5"/>`;
  o+=`<text x="${(tapL+tapR)/2}" y="${tapY+14}" text-anchor="middle"
    font-family="Noto Sans KR,sans-serif" font-size="9" fill="#4a6d8c">멀티탭</text>`;

  /* 전기기구 */
  apps.forEach(({x,l,c,ci})=>{
    const bw=38,bh=34,bt=50;
    o+=`<line x1="${x}" y1="${tY}" x2="${x}" y2="${bt}" stroke="${c}" stroke-width="1.8" opacity=".6"/>`;
    o+=`<rect x="${x-bw/2}" y="${bt}" width="${bw}" height="${bh}" rx="4"
      fill="#080f28" stroke="${c}" stroke-width="1.8" filter="url(#cg)"/>`;
    o+=`<text x="${x}" y="${bt+16}" text-anchor="middle"
      font-family="Orbitron,sans-serif" font-size="14" font-weight="700"
      fill="${c}">${l}</text>`;
    o+=`<text x="${x}" y="${bt+28}" text-anchor="middle"
      font-family="Space Mono,monospace" font-size="8" fill="${c}" opacity=".7">${ci}A</text>`;
    o+=`<line x1="${x}" y1="${bt+bh}" x2="${x}" y2="${tapY}"
      stroke="${c}" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>`;
    o+=`<circle cx="${x}" cy="${tY}" r="3.5" fill="${c}" opacity=".8"/>`;
  });

  svg.innerHTML=o;
}

function renderField(){
  const svg=document.getElementById('field-svg');
  const W=700,H=44,n=10;
  const step=W/(n+0.5);
  let o='';
  for(let i=0;i<n;i++){
    const ax=W-16-i*step;
    const len=step*0.62;
    const a=0.28+(i/n)*0.62;
    /* gradient sim via opacity */
    o+=`<line x1="${ax}" y1="22" x2="${ax-len}" y2="22"
      stroke="#00e5ff" stroke-width="1.8" opacity="${a.toFixed(2)}"/>`;
    o+=`<polygon points="${ax-len},22 ${ax-len+8},17 ${ax-len+8},27"
      fill="#00e5ff" opacity="${a.toFixed(2)}"/>`;
  }
  svg.innerHTML=o;
}

function renderChoices(){
  const c=prob.total;
  const wrongs=new Set();
  [c+1,c-1,c+2,c-2,c+3,
   prob.iA+prob.iB,prob.iB+prob.iC,
   Math.max(1,c-4),c+4]
    .filter(v=>v>0&&v!==c&&Number.isInteger(v))
    .forEach(v=>wrongs.add(v));
  let wa=[...wrongs];
  let e=1;while(wa.length<4){if(e!==c&&!wa.includes(e))wa.push(e);e++;}
  const all=[...wa.slice(0,4),c].sort((a,b)=>a-b);
  const idx=['①','②','③','④','⑤'];
  const el=document.getElementById('choices');el.innerHTML='';
  all.forEach((v,i)=>{
    const btn=document.createElement('button');
    btn.className='choice';btn.dataset.v=v;
    btn.innerHTML=`<span class="c-idx">${idx[i]}</span>`+
      `<span class="c-num">${v}</span><span class="c-unit">A</span>`;
    btn.onclick=()=>check(v,btn);
    el.appendChild(btn);
  });
}

function check(sel,btn){
  if(answered)return;answered=true;
  const ok=sel===prob.total;
  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true;
    const v=parseInt(b.dataset.v);
    if(v===prob.total)b.classList.add('correct');
    else if(b===btn)b.classList.add('wrong');
  });
  if(ok)streak++;else streak=0;
  updateStreak();
  showFb(ok);
}

function updateStreak(){
  for(let i=0;i<5;i++){
    document.getElementById('d'+i).classList.toggle('on',i<streak);
  }
  document.getElementById('streak-lbl').textContent=
    streak>0?`${streak}연속 정답 🔥`:'연속 정답';
}

function showFb(ok){
  const{iA,iB,iC,PA,PB,PC,total}=prob;
  const banner=document.getElementById('fb-banner');
  banner.className='fb-banner '+(ok?'ok':'ng');
  document.getElementById('fb-icon').textContent=ok?'✓':'✕';
  document.getElementById('fb-title').textContent=ok
    ?'정답!':'오답 — 풀이를 확인하세요';
  document.getElementById('fb-sub').textContent=ok
    ?'병렬 회로에서 각 기구 전류의 합을 정확히 구했습니다.'
    :`정답은 ${total} A 입니다.`;

  const cols=['#ff7043','#42a5f5','#66bb6a'];
  const ls=['A','B','C'],Is=[iA,iB,iC],Ps=[PA,PB,PC];
  document.getElementById('sol-cards').innerHTML=
    Is.map((I,i)=>`
      <div class="sol-card">
        <div class="sol-card-lbl" style="color:${cols[i]}">기구 ${ls[i]}</div>
        <div class="sol-card-eq">
          I = P ÷ V<br>
          = <b>${Ps[i]}</b> ÷ <b>${V}</b><br>
          = <b class="hi" style="color:${cols[i]}">${I} A</b>
        </div>
      </div>`).join('')+`
    <div class="sol-card">
      <div class="sol-card-lbl" style="color:var(--cyan)">합산</div>
      <div class="sol-card-eq">
        I = I<sub>A</sub>+I<sub>B</sub>+I<sub>C</sub><br>
        = <b>${iA}</b>+<b>${iB}</b>+<b>${iC}</b><br>
        = <b class="hi" style="color:var(--cyan)">${total} A</b>
      </div>
    </div>`;

  document.getElementById('ans-val').textContent=total;
  document.getElementById('ans-formula').innerHTML=
    `I<sub>총</sub> = P<sub>총</sub> ÷ V<br>`+
    `= ${PA+PB+PC} ÷ ${V}<br>`+
    `= <b style="color:var(--cyan)">${total} A</b>`;

  document.getElementById('fb').classList.add('show');
}

window.addEventListener('load',newProblem);
</script>
</body>
